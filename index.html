  function renderQuestion(){
    const q = state.scenario.question;
    const mainPane = document.querySelector('.card .main');
    mainPane?.classList.toggle('stable-map-layout', (state.mode === 'position' || state.mode === 'practice') && ['debuffFlow','through','floodGc3','magicCharge'].includes(state.scenario?.positionKind));
    mainPane?.classList.toggle('practice-layout', isPracticeMode());
    $('#qLabel').textContent = q.type;
    if(q.promptHtml){
      $('#questionText').innerHTML = q.promptHtml;
    } else {
      $('#questionText').innerText = q.prompt;
    }
    $('#questionNote').textContent = q.note || '';
    const opts = $('#options');
    const mapWrap = $('#mapWrap');
    const mapArena = $('#mapArena');
    const mapTitle = $('#mapTitle');
    const mapHelp = $('#mapHelp');
    const mapActions = $('#positionMapActions');
    opts.innerHTML = '';
    mapWrap.classList.remove('show');
    mapActions.classList.remove('show');
    mapArena.innerHTML = '';
    mapArena.className = 'arena';
    mapTitle.textContent = 'マップ';
    mapHelp.textContent = '';
    clearThroughReadBossMarkers();

    if(q.debuffSet1Board){
      mapWrap.classList.add('show');
      if(state.mode === 'position' || state.mode === 'practice') mapActions.classList.add('show');
      mapTitle.textContent = q.type;
      mapHelp.textContent = q.note || '';
      renderDebuffSet1Board(mapArena, q, state.selected, state.answered, state.revealed);
      const set1Sel = currentDebuffSet1Selection();
      opts.innerHTML = '';

      const rb = $('#resultBox');
      rb.className = 'result';
      if(state.answered){
        if(state.revealed){
          rb.classList.add('show', 'ok');
          $('#resultTitle').textContent = '正解を表示中';
          $('#resultText').innerText = `正解：${debuffSet1CorrectLabel(q)}${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ' ＋ 加速度なし'}

${q.explanation}`;
        } else {
          const ok = p4DebuffSet1SelectionIsCorrect(set1Sel, q);
          rb.classList.add('show', ok ? 'ok' : 'ng');
          $('#resultTitle').textContent = ok ? '正解' : '不正解';
          $('#resultText').innerText = `正解：${debuffSet1CorrectLabel(q)}${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ' ＋ 加速度なし'}

${q.explanation}`;
        }
      } else if(set1Sel.key || set1Sel.accel){
        rb.classList.add('show');
        $('#resultTitle').textContent = '判定途中';
        const clicked = set1Sel.key ? `位置：${(q.debuffSet1Board.positions || []).find(p => p.key === set1Sel.key)?.label || set1Sel.key}` : '位置：未入力';
        const accel = q.accelCheck?.required ? (set1Sel.accel ? `加速度：${accelActionLabel(set1Sel.accel)}` : '加速度：未入力') : '加速度：なし';
        const nextText = q.accelCheck?.required
          ? '位置を選んだあと、選択したボタンの下に出る動く/止まるを選ぶと判定します。'
          : '位置を選ぶと判定します。';
        $('#resultText').innerText = `${clicked}
${accel}

${nextText}`;
      } else {
        $('#resultTitle').textContent = '';
        $('#resultText').textContent = '';
      }
      return;
    }

    if(q.aoeGazeBoard){
      const sel = currentGazeAoeSelection();
      mapWrap.classList.add('show');
      if(state.mode === 'position' || state.mode === 'practice') mapActions.classList.add('show');
      mapTitle.textContent = q.type;
      mapHelp.textContent = q.note || '';
      renderP4GazeAoeBoard(mapArena, q.aoeGazeBoard, state.selected, state.answered, state.revealed);

      // 早視線スライドは向きだけを判定する。早加速度は前の早デバフ処理で処理済み。
      opts.innerHTML = '';

      const rb = $('#resultBox');
      rb.className = 'result';
      if(state.answered){
        if(state.revealed){
          rb.classList.add('show', 'ok');
          $('#resultTitle').textContent = '正解を表示中';
          $('#resultText').innerText = `緑で塗られた雷予兆の安置をクリックし、マーカーを「${gazeDirectionLabel(q.correctDirection)}」に向けます。${q.accelCheck?.required ? `\n加速度：${accelActionLabel(q.accelCheck.correct)}` : `\n加速度：なし`}

${q.explanation}`;
        } else {
          const ok = p4GazeAoeSelectionIsCorrect(sel, q);
          rb.classList.add('show', ok ? 'ok' : 'ng');
          $('#resultTitle').textContent = ok ? '正解' : '不正解';
          $('#resultText').innerText = `正解：雷予兆の安置 ＋ マーカー${gazeDirectionLabel(q.correctDirection)}${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ''}

${q.explanation}`;
        }
      } else if(sel.point || sel.direction || sel.accel){
        rb.classList.add('show');
        $('#resultTitle').textContent = '判定途中';
        const clicked = sel.point ? '安置クリック：入力済み' : '安置クリック：未入力';
        const dir = sel.direction ? `マーカー向き：${gazeDirectionLabel(sel.direction)}` : 'マーカー向き：未入力';
        const accel = q.accelCheck?.required ? (sel.accel ? `加速度：${accelActionLabel(sel.accel)}` : '加速度：未入力') : '加速度：なし';
        const nextText = q.accelCheck?.required
          ? '安置クリックと向き入力後、マップ上のミニ選択肢で動く/止まるを選ぶと判定します。'
          : '安置クリック後、マップ上に出る向きボタンで見る（内）/見ない（外）を選ぶと判定します。';
        $('#resultText').innerText = `${clicked}
${dir}
${accel}

${nextText}`;
      } else {
        $('#resultTitle').textContent = '';
        $('#resultText').textContent = '';
      }
      return;
    }

    if(q.debuffSet2Board){
      mapWrap.classList.add('show');
      if(state.mode === 'position' || state.mode === 'practice') mapActions.classList.add('show');
      mapTitle.textContent = q.type;
      mapHelp.textContent = q.note || '';
      renderDebuffSet2Board(mapArena, q, state.selected, state.answered, state.revealed);
      const set2Sel = currentDebuffSet2Selection();
      opts.innerHTML = '';

      const rb = $('#resultBox');
      rb.className = 'result';
      if(state.answered){
        if(state.revealed){
          rb.classList.add('show', 'ok');
          $('#resultTitle').textContent = '正解を表示中';
          $('#resultText').innerText = `正解：${debuffSet2CorrectAreaLabel(q)} の点線エリア内 ＋ 氷床真偽込みの安置${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ' ＋ 加速度なし'}

緑で塗られた範囲が氷床の本当の安置です。正解の点線エリアと重なっている部分をクリックします。

${q.explanation}`;
        } else {
          const ok = p4DebuffSet2SelectionIsCorrect(set2Sel, q);
          rb.classList.add('show', ok ? 'ok' : 'ng');
          $('#resultTitle').textContent = ok ? '正解' : '不正解';
          $('#resultText').innerText = `正解：${debuffSet2CorrectAreaLabel(q)} の点線エリア内 ＋ 氷床真偽込みの安置${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ' ＋ 加速度なし'}

${q.explanation}`;
        }
      } else if(set2Sel.point || set2Sel.accel){
        rb.classList.add('show');
        $('#resultTitle').textContent = '判定途中';
        const clicked = set2Sel.point ? '位置クリック：入力済み' : '位置クリック：未入力';
        const accel = q.accelCheck?.required ? (set2Sel.accel ? `加速度：${accelActionLabel(set2Sel.accel)}` : '加速度：未入力') : '加速度：なし';
        const nextText = q.accelCheck?.required
          ? '位置をクリックしたあと、マップ上のミニ選択肢で動く/止まるを選ぶと判定します。'
          : '位置をクリックすると判定します。';
        $('#resultText').innerText = `${clicked}
${accel}

${nextText}`;
      } else {
        $('#resultTitle').textContent = '';
        $('#resultText').textContent = '';
      }
      return;
    }

    if(q.lateGazeBoard){
      mapWrap.classList.add('show');
      if(state.mode === 'position' || state.mode === 'practice') mapActions.classList.add('show');
      mapTitle.textContent = q.type;
      mapHelp.textContent = q.note || '';
      renderLateGazeBoard(mapArena, q, state.selected, state.answered, state.revealed);
      opts.innerHTML = '';

      const lateSel = currentLateGazeSelection();
      const rb = $('#resultBox');
      rb.className = 'result';
      if(state.answered){
        if(state.revealed){
          rb.classList.add('show', 'ok');
          $('#resultTitle').textContent = '正解を表示中';
          $('#resultText').innerText = `正解：${q.correctPosition === 'inside' ? 'ケフカ足元の点線円内' : 'ケフカのタゲサ外'} ＋ マーカー${gazeDirectionLabel(q.correctDirection)}${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ''}

${q.explanation}`;
        } else {
          const ok = p4LateGazeSelectionIsCorrect(lateSel, q);
          rb.classList.add('show', ok ? 'ok' : 'ng');
          $('#resultTitle').textContent = ok ? '正解' : '不正解';
          $('#resultText').innerText = `正解：${q.correctPosition === 'inside' ? 'ケフカ足元の点線円内' : 'ケフカのタゲサ外'} ＋ マーカー${gazeDirectionLabel(q.correctDirection)}${q.accelCheck?.required ? ` ＋ 加速度${accelActionLabel(q.accelCheck.correct)}` : ''}

${q.explanation}`;
        }
      } else if(lateSel.point || lateSel.direction){
        rb.classList.add('show');
        $('#resultTitle').textContent = '判定途中';
        const clicked = lateSel.point ? '位置クリック：入力済み' : '位置クリック：未入力';
        const dir = lateSel.direction ? `マーカー向き：${gazeDirectionLabel(lateSel.direction)}` : 'マーカー向き：未入力';
        const accel = q.accelCheck?.required ? (lateSel.accel ? `加速度：${accelActionLabel(lateSel.accel)}` : '加速度：未入力') : '加速度：処理済み';
        const nextText = q.accelCheck?.required
          ? '位置クリックと向き入力後、マップ上のミニ選択肢で動く/止まるを選ぶと判定します。'
          : '位置クリック後、マップ上に出る見る（内）/見ない（外）ボタンを選ぶと判定します。';
        $('#resultText').innerText = `${clicked}
${dir}
${accel}

${nextText}`;
      } else {
        $('#resultTitle').textContent = '';
        $('#resultText').textContent = '';
      }
      return;
    }

    if(q.aoeBoard){
      mapWrap.classList.add('show');
      if(state.mode === 'position' || state.mode === 'practice') mapActions.classList.add('show');
      mapTitle.textContent = q.type;
      mapHelp.textContent = q.note || '';
      renderP4AoeBoard(mapArena, q.aoeBoard, state.selected, state.answered, state.revealed);
      if((state.mode === 'position' || state.mode === 'practice') && ['through','floodGc3'].includes(state.scenario?.positionKind) && throughSourceForSlide(state.scenario.throughSlide || 0).kind === 'read'){
        appendThroughReadBossMarkers(mapArena, state.scenario);
      }
      if((state.mode === 'position' || state.mode === 'practice') && state.scenario?.positionKind === 'debuffFlow' && (state.scenario.debuffFlowSlide || 0) < DEBUFF_FLOW_READ_TOTAL){
        appendThroughReadBossMarkers(mapArena, state.scenario);
      }
      opts.innerHTML = '';

      const rb = $('#resultBox');
      rb.className = 'result';
      if(state.answered){
        if(state.revealed){
          rb.classList.add('show', 'ok');
          $('#resultTitle').textContent = '正解を表示中';
          $('#resultText').innerText = `緑で塗られた範囲が正解安置です。

${q.note || ''}`;
        } else {
          const ok = p4AoeQuestionPointIsCorrect(state.selected, q);
          rb.classList.add('show', ok ? 'ok' : 'ng');
          $('#resultTitle').textContent = ok ? '正解' : '不正解';
          $('#resultText').innerText = `正解：緑で塗られた範囲内

${q.note || ''}`;
        }
      } else {
        $('#resultTitle').textContent = '';
        $('#resultText').textContent = '';
      }
      return;
    }

    if(q.parts){
      q.parts.forEach((part, idx) => {
        const card = document.createElement('div');
        card.className = 'part-card';

        const title = document.createElement('h4');
        title.textContent = part.displayTitle || `${idx + 1}. ${part.type}`;
        card.appendChild(title);

        const prompt = document.createElement('p');
        if(part.promptHtml){
          prompt.innerHTML = part.promptHtml;
        } else {
          prompt.innerText = part.prompt;
        }
        card.appendChild(prompt);

        const buttons = document.createElement('div');
        buttons.className = 'part-options';
        part.options.forEach(o => {
          const btn = document.createElement('button');
          btn.className = `option ${o.cls || ''}`;
          btn.textContent = o.label;
          btn.disabled = part.answered;
          if(part.answered){
            if(o.key === part.correct) btn.classList.add('correct');
            if(o.key === part.selected && o.key !== part.correct) btn.classList.add('wrong');
          }
          btn.addEventListener('click', () => answerPart(idx, o.key));
          buttons.appendChild(btn);
        });
        card.appendChild(buttons);

        if(part.answered){
          const ok = part.selected === part.correct;
          const result = document.createElement('div');
          result.className = `part-result ${ok ? 'ok' : 'ng'}`;
          const correctLabel = part.options.find(o => o.key === part.correct)?.label || part.correct;
          result.innerText = `${ok ? '正解' : '不正解'}
正解：${correctLabel}

${part.explanation}`;
          card.appendChild(result);
        }

        opts.appendChild(card);
      });

      const rb = $('#resultBox');
      rb.className = 'result';
      $('#resultTitle').textContent = '';
      $('#resultText').textContent = '';
      return;
    }

    if(q.map){
      mapWrap.classList.add('show');
      if(state.mode === 'position' || state.mode === 'practice') mapActions.classList.add('show');
      mapTitle.textContent = q.type;
      mapHelp.textContent = q.map.help || '';
      mapArena.classList.add(
        q.type.includes('無の氾濫') ? 'flood' : (q.type.includes('2セット目') ? 'set2' : 'set1')
      );
      const floodRevealLevel = q.type.includes('無の氾濫') ? practiceThroughFloodRevealLevel() : 2;
      mapArena.classList.toggle('flood-delay', q.type.includes('無の氾濫') && floodRevealLevel < 2);
      if(q.type.includes('無の氾濫')){
        mapArena.style.setProperty('--flood-rotation', `${q.map.rotationDeg || 0}deg`);
        if(floodRevealLevel >= 2){
          (q.map.lanes || []).forEach(lane => {
            const el = document.createElement('div');
            el.className = `beam-lane ${lane.color}`;
            el.style.left = `${lane.x}%`;
            el.style.top = `${lane.y}%`;
            el.style.transform = `translate(-50%,-50%) rotate(${q.map.rotationDeg || 0}deg)`;
            mapArena.appendChild(el);
          });
          (q.map.symbols || []).forEach(symbol => {
            const el = document.createElement('div');
            if(symbol.kind === 'truth'){
              el.className = 'flood-symbol truth';
              el.innerHTML = truthIconHtml(symbol.truth);
            } else {
              el.className = `flood-symbol ${symbol.color}`;
              el.textContent = symbol.label;
            }
            el.style.left = `${symbol.x}%`;
            el.style.top = `${symbol.y}%`;
            mapArena.appendChild(el);
          });
        }
      } else {
        mapArena.style.removeProperty('--flood-rotation');
      }
      if(q.map.iceBoard){
        renderDebuffIceBoard(mapArena, q.map.iceBoard);
      }
      if(!q.type.includes('無の氾濫') || floodRevealLevel >= 1){
        (q.map.bossMarkers || []).forEach(mark => {
          const el = document.createElement('div');
          el.className = 'arena-boss-marker';
          el.style.left = `${mark.x}%`;
          el.style.top = `${mark.y}%`;
          el.innerHTML = mark.label;
          mapArena.appendChild(el);
        });
      }
      const mapPositionsToRender = (q.type.includes('無の氾濫') && floodRevealLevel < 2) ? [] : q.map.positions;
      mapPositionsToRender.forEach(pos => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `map-marker ${pos.cls || ''}`;
        btn.style.left = `${pos.x}%`;
        btn.style.top = `${pos.y}%`;
        btn.innerHTML = pos.html || (pos.label || '').replace(/\n/g,'<br>');
        btn.disabled = answerLocked();
        if(state.answered){
          if(pos.key === q.correct) btn.classList.add('correct');
          if(pos.key === state.selected && pos.key !== q.correct) btn.classList.add('wrong');
        } else if(pos.key === state.selected){
          btn.classList.add('pending');
        }
        btn.addEventListener('click', () => answer(pos.key));
        mapArena.appendChild(btn);
      });
      appendArenaCommonHud(mapArena);
    } else {
      q.options.forEach(o => {
        const btn = document.createElement('button');
        btn.className = `option ${o.cls || ''}`;
        btn.textContent = o.label;
        btn.disabled = answerLocked();
        if(state.answered){
          if(o.key === q.correct) btn.classList.add('correct');
          if(o.key === state.selected && o.key !== q.correct) btn.classList.add('wrong');
        } else if(o.key === state.selected){
          btn.classList.add('pending');
        }
        btn.addEventListener('click', () => answer(o.key));
        opts.appendChild(btn);
      });
    }

    const rb = $('#resultBox');
    rb.className = 'result';
    if(state.answered){
      const ok = state.selected === q.correct;
      rb.classList.add('show', ok ? 'ok' : 'ng');
      $('#resultTitle').textContent = ok ? '正解' : '不正解';
      const correctLabel = q.options.find(o => o.key === q.correct)?.label || q.correct;
      $('#resultText').innerText = `正解：${correctLabel}

${q.explanation}`;
    } else {
      $('#resultTitle').textContent = '';
      $('#resultText').textContent = '';
    }
  }

  function renderCheatsheet(){
    const el = $('#cheatsheet');
    if(state.mode === 'practice'){
      if(state.tab === 'gc1'){
        el.innerHTML = state.floodVariant === 'withGc3'
          ? '<strong>GC3＋無の氾濫メモ</strong><br>2枚構成：3回目GC読取 → 無の氾濫。GC3読取は元の通し練習3枚目、無の氾濫は元の通し練習4枚目のシークバー時間を使います。'
          : '<strong>無の氾濫メモ</strong><br>3カウント後にタイマーが開始します。青/紫ビームとTH/DPS側を制限時間内にクリックします。時間切れは不正解として正解安置を表示し、次の問題へ進みます。';
      } else if(state.tab === 'gc2'){
        el.innerHTML = '<strong>デバフ処理メモ</strong><br>3カウント後にタイマーが開始します。10枚構成：GC1読取 → GC2読取 → 早デバフ＋早加速度 → 早視線 → 中央 → 早ほのお → 遅雷水＋遅加速度 → 遅視線 → 中央 → 遅つなみ。最後まで進むと同じタブの別問題セットに切り替わります。';
      } else if(state.tab === 'gc3'){
        el.innerHTML = '<strong>マジックチャージメモ</strong><br>3カウント後にタイマーが開始します。3枚構成：雷床チャージ → 氷床チャージ → マジックアウト。床真偽込みの安置を制限時間内にクリックします。';
      } else {
        el.innerHTML = '<strong>P4通しメモ</strong><br>3カウント後にタイマーが開始します。13枚構成：GC1読取 → GC2読取 → GC3読取 → 無の氾濫 → 早デバフ＋早加速度 → 早視線 → 中央 → 早ほのお → 遅雷水＋遅加速度 → 遅視線 → 中央 → 遅つなみ → マジックアウト。時間切れは不正解として正解安置を表示し、次のスライドへ進みます。';
      }
      return;
    }
    if(state.mode === 'position'){
      if(state.tab === 'gc1'){
        el.innerHTML = state.floodVariant === 'withGc3'
          ? '<strong>GC3＋無の氾濫メモ</strong><br>2枚構成：3回目GC読取 → 無の氾濫。直前の読取から、実際に入るビーム位置まで確認できます。'
          : '<strong>無の氾濫メモ</strong><br>中央即死ビームを避けつつ、正しい色のビームへ。THはエクスデス側、DPSは反対側。';
      } else if(state.tab === 'gc2'){
        el.innerHTML = '<strong>デバフ処理メモ</strong><br>10枚構成：GC1読取 → GC2読取 → 早デバフ処理（早加速度込み） → 早視線（雷予兆安置＋向き付きマーカー） → 中央集合 → 早ほのお/つなみ → 遅雷水（遅加速度込み） → 遅視線 → 中央集合 → 遅ほのお/つなみ。マジックチャージの暗記と最後のマジックアウトは通し練習側で扱う。';
      } else if(state.tab === 'gc3'){
        el.innerHTML = '<strong>マジックチャージ位置確認メモ</strong><br>1枚目は雷床チャージ、2枚目は氷床チャージ。デバフ処理・向き・加速度は省略し、床真偽込みの安置クリックだけを練習します。3枚目は雷床＋氷床のマジックアウト最終安置をクリックします。';
      } else {
        el.innerHTML = '<strong>P4通し練習メモ</strong><br>13枚構成：1〜3枚目はGCデバフ付与＋なぞなぞマジック床、4枚目は無の氾濫、5〜12枚目はデバフ処理マップ、13枚目はマジックアウト。1〜3枚目はフィールド外左上にカオス、右上にエクスデスを表示。＜＞で同じ問題セット内のスライド移動、別の問題/前の問題で別セットへ切り替え。';
      }
      return;
    }
    if(state.mode === 'gimmick' && state.tab === 'magic'){
      el.innerHTML = `
        <strong>マジックチャージメモ</strong><br>
        1セット目のデバフ処理中は雷床をチャージ。真なら表示安置、偽なら反対安置に入って覚える。<br>
        2セット目のデバフ処理中は氷床をチャージ。真なら表示安置、偽なら反対安置に入って覚える。<br>
        2セット目終了後のマジックアウトで、雷床・氷床それぞれにもう一度真偽が付く。真なら覚えた安置、偽なら反対安置を踏む。
      `;
      return;
    }
    if(state.tab === 'gc1'){
      el.innerHTML = `
        <strong>1回目GCメモ</strong><br>
        TH/DPSに水圧縮・フォークライトニングがそれぞれ1人ずつ。水雷の早遅は共通でランダム。早叫声がつく。叫声はデバフが付いたプレイヤーから発生する視線。さらにTH/DPSに早/遅加速度爆弾がそれぞれ1人ずつ。パーティーリストでは実際の残り時間に寄せて、早水雷/早加速度爆弾=50、遅水雷/遅加速度爆弾=1m、早叫声=59で表示。混沌の炎/混沌の水は全員に付き、早なら59、遅なら1m。混沌の炎/混沌の水も、どちらのセットで処理するかと、真偽込みでタケノコ円/タケノコドーナツ範囲のどちらが来るかを確認する。
        <table><thead><tr><th>デバフ</th><th>真</th><th>偽</th></tr></thead><tbody>
          <tr><td><span class="badge water">水圧縮</span></td><td>頭割り</td><td>散開</td></tr>
          <tr><td><span class="badge lightning">フォークライトニング</span></td><td>散開</td><td>頭割り</td></tr>
          <tr><td><span class="badge accel">加速度爆弾</span></td><td>止まる</td><td>動く</td></tr>
          <tr><td><span class="badge gaze">呪詛の叫声</span></td><td>見ない（外）</td><td>見る（内）</td></tr>
          <tr><td><span class="badge fire">混沌の炎（ほのお）</span></td><td>タケノコ円</td><td>タケノコドーナツ範囲</td></tr>
          <tr><td><span class="badge waterChaos">混沌の水（つなみ）</span></td><td>タケノコドーナツ範囲</td><td>タケノコ円</td></tr>
        </tbody></table>`;
    } else if(state.tab === 'gc2'){
      el.innerHTML = `
        <strong>2回目GCメモ</strong><br>
        水圧縮・フォークライトニングの早遅は1回目と逆。遅叫声がつく。叫声はデバフが付いたプレイヤーから発生する視線。加速度爆弾は1回目と同じく早/遅があり、真偽で動く/止まるが変わる。2回目タブでは、1回目で付いたデバフの残り時間も併記。2回目の早水雷/早加速度爆弾=35、遅水雷=59、遅加速度爆弾/遅叫声=1m、2回目の混沌の炎/混沌の水は早なら45、遅なら1m。混沌の炎/混沌の水も、どちらのセットで処理するかと、真偽込みでタケノコ円/タケノコドーナツ範囲のどちらが来るかを確認する。
        <table><thead><tr><th>デバフ</th><th>真</th><th>偽</th></tr></thead><tbody>
          <tr><td><span class="badge water">水圧縮</span></td><td>頭割り</td><td>散開</td></tr>
          <tr><td><span class="badge lightning">フォークライトニング</span></td><td>散開</td><td>頭割り</td></tr>
          <tr><td><span class="badge accel">加速度爆弾</span></td><td>止まる</td><td>動く</td></tr>
          <tr><td><span class="badge gaze">呪詛の叫声</span></td><td>見ない（外）</td><td>見る（内）</td></tr>
          <tr><td><span class="badge fire">混沌の炎（ほのお）</span></td><td>タケノコ円</td><td>タケノコドーナツ範囲</td></tr>
          <tr><td><span class="badge waterChaos">混沌の水（つなみ）</span></td><td>タケノコドーナツ範囲</td><td>タケノコ円</td></tr>
        </tbody></table>`;
    } else {
      el.innerHTML = `
        <strong>3回目GCメモ</strong><br>
        3回目グランドクロスの真偽がどちらでも、<strong>死の超越ならデバフと同色ビーム</strong>、<strong>アラガンなら逆色ビーム</strong>に当たれば処理できる。<br>
        その後、<strong>ビームに嘘がついていたら逆の色が正解になる。</strong>選択肢では、自分の傷デバフに応じて「青ビーム（同色/異色）」「紫ビーム（同色/異色）」と表示する。
        <table><thead><tr><th>デバフ</th><th>ビーム真</th><th>ビーム偽</th></tr></thead><tbody>
          <tr><td><span class="badge trans">死の超越</span></td><td>同色</td><td>逆色</td></tr>
          <tr><td><span class="badge allagan">アラガンフィールド</span></td><td>逆色</td><td>同色</td></tr>
        </tbody></table>`;
    }
  }

  function resetStats(){
    state.stats[activeStatKey()] = {ok:0,total:0};
    renderScore();
  }

  $$('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.classList.contains('hidden')) return;
      clearAutoTimer();
      resetPracticeRuntime();
      $$('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.tab = btn.dataset.tab;
      state.history = [];
      state.historyIndex = -1;
      state.debuffFlowSlideIndex = 0;
      state.magicSlideIndex = 0;
      state.throughSlideIndex = 0;
      state.floodGc3SlideIndex = 0;
      newQuestion();
    });
  });
  $$('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      clearAutoTimer();
      $$('.mode-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
      state.tab = standaloneTabForMode();
      resetPracticeRuntime();
      updatePhaseTabLabels();
      state.history = [];
      state.historyIndex = -1;
      state.debuffFlowSlideIndex = 0;
      state.magicSlideIndex = 0;
      state.throughSlideIndex = 0;
      state.floodGc3SlideIndex = 0;
      newQuestion();
    });
  });
  $$('.variant-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.dataset.variant === state.floodVariant) return;
      clearAutoTimer();
      state.floodVariant = btn.dataset.variant;
      resetPracticeRuntime();
      state.history = [];
      state.historyIndex = -1;
      state.floodGc3SlideIndex = 0;
      state.throughSlideIndex = 0;
      newQuestion();
    });
  });
  $('#nextBtn').addEventListener('click', newQuestion);
  $('#prevBtn').addEventListener('click', prevQuestion);
  $('#showAnswerBtn').addEventListener('click', showAnswer);
  $('#mapNextBtn').addEventListener('click', newQuestion);
  $('#mapPrevBtn').addEventListener('click', prevQuestion);
  $('#mapRetryBtn').addEventListener('click', retryCurrentQuestion);
  $('#mapSlidePrevBtn').addEventListener('click', () => withPreservedScroll(() => isPracticeMode() ? movePracticeSlide(-1) : movePositionSlideButton(-1)));
  $('#mapSlideNextBtn').addEventListener('click', () => withPreservedScroll(() => isPracticeMode() ? movePracticeSlide(1) : movePositionSlideButton(1)));
  $('#mapShowAnswerBtn').addEventListener('click', showAnswer);
  $('#practiceRestartBtn').addEventListener('click', startPracticeCurrent);
  $('#mapPracticeStartBtn')?.addEventListener('click', startPracticeCurrent);
  $('#practicePauseBtn').addEventListener('click', togglePracticePause);
  $('#practiceMapPauseBtn')?.addEventListener('click', togglePracticePause);
  $('#mapPracticePauseBtn2')?.addEventListener('click', togglePracticePause);
  $('#resetBtn').addEventListener('click', resetStats);
  $('#roleSelect').addEventListener('change', (e) => changeSelfRole(e.target.value));
  function setOneByOne(checked){
    state.oneByOne = !!checked;
    const top = $('#oneByOneToggle');
    const map = $('#mapOneByOneToggle');
    if(top) top.checked = state.oneByOne;
    if(map) map.checked = state.oneByOne;
    if(state.oneByOne) clearAutoTimer();
    if(state.oneByOne && state.practice?.phase === 'summary' && state.practice.autoAdvanceTimer){
      clearTimeout(state.practice.autoAdvanceTimer);
      state.practice.autoAdvanceTimer = null;
    } else if(!state.oneByOne && isPracticeMode() && state.practice?.phase === 'summary' && !state.practice.paused && !state.practice.autoAdvanceTimer){
      state.practice.autoAdvanceTimer = setTimeout(() => newPracticeSet(true), 3000);
    }
    updatePracticeTimerUi();
  }
  $('#oneByOneToggle').addEventListener('change', (e) => setOneByOne(e.target.checked));
  $('#mapOneByOneToggle')?.addEventListener('change', (e) => setOneByOne(e.target.checked));
  $('#partyTruthToggle').addEventListener('change', (e) => {
    state.showPartyTruth = e.target.checked;
    renderParty();
    renderMobileSelfPanel();
  });
  $('#debuffDetailToggle').addEventListener('change', (e) => {
    state.showDebuffDetails = e.target.checked;
    renderParty();
    renderMobileSelfPanel();
  });

  updatePhaseTabLabels();
  newQuestion();
})();
</script>
