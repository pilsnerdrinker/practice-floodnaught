  function updatePracticeTimerUi(){
    const controls = $('#practiceControls');
    const bar = $('#practiceTimerBar');
    const status = $('#practiceStatus');
    const mapTimer = $('#practiceMapTimer');
    const mapBar = $('#practiceMapTimerBar');
    const mapStatus = $('#practiceMapStatus');
    const pauseBtn = $('#practicePauseBtn');
    const mapPauseBtn = $('#practiceMapPauseBtn');
    const mapPauseBtn2 = $('#mapPracticePauseBtn2');
    const mapStartBtn = $('#mapPracticeStartBtn');
    const startBtn = $('#practiceRestartBtn');
    if(!controls || !bar || !status || !pauseBtn) return;
    const showPractice = isPracticeMode();
    controls.classList.remove('show');
    mapTimer?.classList.toggle('show', showPractice);
    if(!showPractice) return;
    const kind = practiceCurrentKind();
    const idx = practiceCurrentSlideIndex();
    const total = practiceSlideTotal(kind);
    const p = state.practice;
    const countdownSeconds = practiceCountdownSeconds(kind);
    if(startBtn) startBtn.textContent = 'スタート';
    if(mapStartBtn) mapStartBtn.textContent = 'スタート';
    const denom = p.slideTimeMs || practiceTimeForSlide(idx, kind);
    const ratio = Math.max(0, Math.min(1, denom ? p.remainingMs / denom : 1));
    const widthText = `${Math.round(ratio * 100)}%`;
    bar.style.width = widthText;
    if(mapBar) mapBar.style.width = widthText;
    status.className = 'practice-status';
    if(mapStatus) mapStatus.className = 'practice-status';
    if(p.phase === 'countdown'){
      status.classList.add('countdown');
      status.textContent = `開始まで ${p.countdown}`;
      pauseBtn.textContent = p.paused ? '再開' : '一時停止';
      if(mapPauseBtn) mapPauseBtn.textContent = pauseBtn.textContent;
      if(mapPauseBtn2) mapPauseBtn2.textContent = pauseBtn.textContent;
    } else if(p.phase === 'answer'){
      if(p.paused) status.classList.add('paused');
      const sec = Math.ceil(Math.max(0, p.remainingMs) / 1000);
      status.textContent = `${idx + 1}/${total} ${practiceSlideLabel(idx, kind)}：残り ${sec}秒${p.paused ? '（停止中）' : ''}`;
      pauseBtn.textContent = p.paused ? '再開' : '一時停止';
      if(mapPauseBtn) mapPauseBtn.textContent = pauseBtn.textContent;
      if(mapPauseBtn2) mapPauseBtn2.textContent = pauseBtn.textContent;
    } else if(p.phase === 'result'){
      status.textContent = `${idx + 1}/${total} 結果表示中${p.paused ? '（停止中）' : ''}`;
      pauseBtn.textContent = p.paused ? '再開' : '一時停止';
      if(mapPauseBtn) mapPauseBtn.textContent = pauseBtn.textContent;
      if(mapPauseBtn2) mapPauseBtn2.textContent = pauseBtn.textContent;
    } else if(p.phase === 'summary'){
      status.textContent = `結果表示中${p.paused ? '（停止中）' : ''}`;
      pauseBtn.textContent = p.paused ? '再開' : '一時停止';
      if(mapPauseBtn) mapPauseBtn.textContent = pauseBtn.textContent;
      if(mapPauseBtn2) mapPauseBtn2.textContent = pauseBtn.textContent;
    } else {
      status.textContent = '実践待機中';
      pauseBtn.textContent = '一時停止';
      if(mapPauseBtn) mapPauseBtn.textContent = '一時停止';
      if(mapPauseBtn2) mapPauseBtn2.textContent = '一時停止';
    }
    if(mapStatus){
      mapStatus.textContent = '';
      mapStatus.className = status.className;
    }
  }

  function startPracticeCountdown(){
    if(!isPracticeMode()) return;
    clearPracticeTimers();
    const kind = practiceCurrentKind();
    const idx = practiceCurrentSlideIndex();
    state.practice.active = true;
    state.practice.paused = false;
    state.practice.phase = 'countdown';
    state.practice.countdown = practiceCountdownSeconds(kind);
    state.practice.slideTimeMs = practiceTimeForSlide(idx, kind);
    state.practice.remainingMs = state.practice.slideTimeMs;
    state.practice.deadline = 0;
    render();
    updatePracticeTimerUi();
    state.practice.tickTimer = setInterval(() => {
      if(!isPracticeMode()) return clearPracticeTimers();
      if(state.practice.paused) return updatePracticeTimerUi();
      state.practice.countdown -= 1;
      if(state.practice.countdown <= 0){
        startPracticeAnswerTimer();
      } else {
        render();
        updatePracticeTimerUi();
      }
    }, 1000);
  }

  function startPracticeAnswerTimer(){
    if(!isPracticeMode()) return;
    clearPracticeTimers();
    state.practice.active = true;
    const kind = practiceCurrentKind();
    const idx = practiceCurrentSlideIndex();
    state.practice.phase = 'answer';
    state.practice.paused = false;
    state.practice.slideTimeMs = practiceTimeForSlide(idx, kind);
    state.practice.remainingMs = state.practice.slideTimeMs;
    state.practice.deadline = Date.now() + state.practice.remainingMs;
    state.practice.gazeRevealRendered = false;
    render();
    updatePracticeTimerUi();
    state.practice.tickTimer = setInterval(tickPracticeTimer, 100);
    if(kind === 'debuffFlow' && idx === DEBUFF_FLOW_READ_TOTAL + 1){
      state.practice.revealDelayTimer = setTimeout(() => {
        if(isPracticeMode() && state.practice.phase === 'answer' && practiceCurrentKind() === 'debuffFlow' && practiceCurrentSlideIndex() === DEBUFF_FLOW_READ_TOTAL + 1){
          state.practice.gazeRevealRendered = true;
          render();
        }
      }, 1000);
    }
  }

  function tickPracticeTimer(){
    if(!isPracticeMode()) return clearPracticeTimers();
    if(state.practice.phase !== 'answer') return updatePracticeTimerUi();
    if(state.practice.paused) return updatePracticeTimerUi();
    const beforeFloodLevel = practiceThroughFloodRevealLevel();
    state.practice.remainingMs = Math.max(0, state.practice.deadline - Date.now());
    if(practiceCurrentKind() === 'debuffFlow' && practiceCurrentSlideIndex() === DEBUFF_FLOW_READ_TOTAL + 1 && !state.practice.gazeRevealRendered && practiceElapsedMs() >= 1000){
      state.practice.gazeRevealRendered = true;
      render();
    }
    const afterFloodLevel = practiceThroughFloodRevealLevel();
    if(['through','floodGc3'].includes(practiceCurrentKind()) && beforeFloodLevel !== afterFloodLevel){
      render();
    }
    updatePracticeTimerUi();
    if(state.practice.remainingMs <= 0){
      practiceTimeout();
    }
  }

  function togglePracticePause(){
    if(!isPracticeMode()) return;
    if(state.practice.phase === 'idle'){
      updatePracticeTimerUi();
      return;
    }
    if(state.practice.paused){
      state.practice.paused = false;
      if(state.practice.phase === 'answer'){
        state.practice.deadline = Date.now() + Math.max(0, state.practice.remainingMs);
      } else if(state.practice.phase === 'result'){
        clearPracticeTimers();
        state.practice.autoAdvanceTimer = setTimeout(advancePracticeAfterResult, 1000);
      } else if(state.practice.phase === 'summary' && !state.oneByOne){
        clearPracticeTimers();
        state.practice.autoAdvanceTimer = setTimeout(() => newPracticeSet(true), 3000);
      }
    } else {
      if(state.practice.phase === 'answer'){
        state.practice.remainingMs = Math.max(0, state.practice.deadline - Date.now());
      }
      if(state.practice.phase === 'result' || state.practice.phase === 'summary'){
        if(state.practice.autoAdvanceTimer){
          clearTimeout(state.practice.autoAdvanceTimer);
          state.practice.autoAdvanceTimer = null;
        }
      }
      state.practice.paused = true;
    }
    updatePracticeTimerUi();
    render();
  }

  function addPracticeLogEntry(ok, timeout = false){
    if(!isPracticeMode()) return;
    const rec = currentRecord();
    if(rec && rec.practiceLogged) return;
    const kind = practiceCurrentKind();
    const idx = practiceCurrentSlideIndex();
    state.practice.log.push({
      index: idx,
      label: practiceSlideLabel(idx, kind),
      ok: !!ok,
      timeout: !!timeout
    });
    if(rec) rec.practiceLogged = true;
  }

  function practiceLogSummaryHtml(){
    const kind = practiceCurrentKind();
    const total = practiceSlideTotal(kind);
    const log = state.practice.log || [];
    const okCount = log.filter(x => x.ok).length;
    const items = [];
    for(let i=0; i<total; i++){
      const entry = log.find(x => x.index === i);
      const ok = entry?.ok;
      const label = practiceSlideLabel(i, kind);
      const mark = ok ? '○' : '×';
      const cls = ok ? 'ok' : 'ng';
      items.push(`<div class="practice-log-item ${cls}">${i + 1}. ${mark} ${label}</div>`);
    }
    return `<div class="practice-log-box"><div class="practice-log-title">結果 ${okCount} / ${total}</div><div class="practice-log-grid">${items.join('')}</div><div class="practice-log-actions"><button type="button" class="action" id="practiceSummaryNextBtn">別の問題</button><button type="button" class="action secondary" id="practiceSummaryRetryBtn">もう一度</button></div></div>`;
  }

  function resetQuestionAnswerState(){
    clearAutoTimer();
    if(isPracticeMode()) clearPracticeTimers();
    state.selected = null;
    state.answered = false;
    state.revealed = false;
    const q = state.scenario?.question;
    if(q?.parts){
      q.parts.forEach(part => {
        part.answered = false;
        part.selected = null;
        part.revealed = false;
        part.scored = false;
      });
    }
    const rec = currentRecord();
    if(rec){
      rec.selected = null;
      rec.answered = false;
      rec.revealed = false;
      rec.scored = false;
      rec.practiceLogged = false;
      rec.scenario = state.scenario;
    }
    saveRecord();
  }

  function retryPracticeSet(autoStart = true){
    if(!isPracticeMode()) return;
    clearAutoTimer();
    clearPracticeTimers();
    state.practice.log = [];
    const kind = practiceCurrentKind();
    if(kind !== 'flood'){
      loadPracticeSlide(0, false);
    } else {
      resetQuestionAnswerState();
      resetPracticeRuntime();
    }
    if(autoStart) startPracticeCurrent();
  }

  function retryCurrentQuestion(){
    if(isPracticeMode() && state.practice.phase === 'summary'){
      retryPracticeSet(true);
      return;
    }
    const idx = practiceCurrentSlideIndex();
    resetQuestionAnswerState();
    if(isPracticeMode()){
      state.practice.log = (state.practice.log || []).filter(entry => entry.index !== idx);
      startPracticeCurrent();
    } else {
      render();
    }
  }

  function showPracticeSummaryThenReset(){
    clearPracticeTimers();
    state.practice.phase = 'summary';
    state.practice.paused = false;
    state.practice.remainingMs = 0;
    render();
    if(!state.oneByOne){
      state.practice.autoAdvanceTimer = setTimeout(() => {
        newPracticeSet(true);
      }, 3000);
    }
  }

  function practiceTimeout(){
    if(!isPracticeMode()) return;
    clearPracticeTimers();
    const q = state.scenario?.question;
    const hasSelection = state.selected !== null && state.selected !== undefined;
    const ok = hasSelection ? currentSelectionIsCorrect() : false;
    state.answered = true;
    state.revealed = true;
    const rec = currentRecord();
    if(rec && !rec.scored && q && !q.noScore){
      state.stats[activeStatKey()].total++;
      if(ok) state.stats[activeStatKey()].ok++;
      rec.scored = true;
    }
    addPracticeLogEntry(ok, !hasSelection);
    state.practice.phase = 'result';
    state.practice.remainingMs = 0;
    saveRecord();
    render();
    state.practice.autoAdvanceTimer = setTimeout(advancePracticeAfterResult, 1000);
  }

  function handlePracticeAnswered(ok){
    clearPracticeTimers();
    state.practice.phase = 'result';
    state.practice.remainingMs = 0;
    if(!ok) state.revealed = true;
    addPracticeLogEntry(ok, false);
    saveRecord();
    render();
    state.practice.autoAdvanceTimer = setTimeout(advancePracticeAfterResult, 1000);
  }

  function startPracticeCurrent(){
    if(!isPracticeMode()) return;
    clearAutoTimer();
    clearPracticeTimers();
    if(!state.scenario){
      const kind = practiceKindFromTab();
      pushRecord(generatePositionScenario(kind, 0));
    }
    state.selected = null;
    state.answered = false;
    state.revealed = false;
    if(practiceCurrentSlideIndex() === 0){
      state.practice.log = [];
    }
    state.practice.throughRevealStage = naturalPracticeRevealStageForSlide(practiceCurrentKind(), practiceCurrentSlideIndex());
    const rec = currentRecord();
    if(rec){
      rec.answered = false;
      rec.selected = null;
      rec.revealed = false;
      rec.scored = false;
      rec.practiceLogged = false;
      rec.scenario = state.scenario;
    }
    saveRecord();
    startPracticeCountdown();
  }

  function naturalThroughRevealStageForSlide(index){
    const idx = Math.max(0, index || 0);
    if(idx <= 0) return 'none';
    if(idx === 1) return 'gc1_all';
    if(idx === 2) return 'gc2_all';
    return 'gc3_all';
  }

  function naturalDebuffFlowRevealStageForSlide(index){
    const idx = Math.max(0, index || 0);
    if(idx <= 0) return 'none';
    if(idx === 1) return 'gc1_all';
    return 'gc2_all';
  }

  function naturalPracticeRevealStageForSlide(kind, index){
    if(kind === 'through') return naturalThroughRevealStageForSlide(index);
    if(kind === 'floodGc3') return index <= 0 ? 'gc2_all' : 'gc3_all';
    if(kind === 'debuffFlow') return naturalDebuffFlowRevealStageForSlide(index);
    return 'all';
  }

  function newPracticeSet(autoStart = false){
    clearAutoTimer();
    clearPracticeTimers();
    state.debuffFlowSlideIndex = 0;
    state.magicSlideIndex = 0;
    state.throughSlideIndex = 0;
    state.floodGc3SlideIndex = 0;
    const kind = practiceKindFromTab();
    state.practice.log = [];
    state.practice.throughRevealStage = naturalPracticeRevealStageForSlide(kind, 0);
    const scenario = generatePositionScenario(kind, 0);
    pushRecord(scenario);
    const rec = currentRecord();
    if(rec) rec.scored = false;
    if(autoStart){
      startPracticeCountdown();
    } else {
      resetPracticeRuntime();
      render();
    }
  }

  function loadPracticeSlide(index, autoStart = true){
    if(!isPracticeMode()) return;
    clearAutoTimer();
    clearPracticeTimers();
    const kind = practiceCurrentKind();
    const total = practiceSlideTotal(kind);
    const clampedIndex = Math.max(0, Math.min(total - 1, index));
    state.practice.throughRevealStage = naturalPracticeRevealStageForSlide(kind, clampedIndex);
    if(kind === 'flood'){
      state.scenario = generatePositionScenario('flood', 0);
    } else if(kind === 'debuffFlow'){
      state.debuffFlowSlideIndex = clampedIndex;
      if(state.scenario?.positionKind === 'debuffFlow'){
        const role = state.scenario.role || $('#roleSelect').value || 'MT';
        state.scenario.debuffFlowSlide = state.debuffFlowSlideIndex;
        state.scenario.question = getDebuffFlowPositionSlideQuestion(state.scenario, role, state.debuffFlowSlideIndex);
      } else {
        state.scenario = generatePositionScenario(kind, state.debuffFlowSlideIndex);
      }
    } else if(kind === 'magicCharge'){
      state.magicSlideIndex = clampedIndex;
      const magicBoard = state.scenario?.magicBoard || state.scenario?.question?.aoeBoard || makeP4AoeConfig('thunderCharge');
      state.scenario = generatePositionScenario(kind, state.magicSlideIndex, magicBoard);
    } else if(kind === 'floodGc3'){
      state.floodGc3SlideIndex = clampedIndex;
      if(state.scenario?.positionKind === 'floodGc3'){
        const role = state.scenario.role || $('#roleSelect').value || 'MT';
        state.scenario.floodGc3Slide = state.floodGc3SlideIndex;
        state.scenario.question = getFloodGc3SlideQuestion(state.scenario, role, state.floodGc3SlideIndex);
      } else {
        state.scenario = generatePositionScenario('floodGc3', state.floodGc3SlideIndex);
      }
    } else {
      state.throughSlideIndex = clampedIndex;
      if(state.scenario?.positionKind === 'through'){
        const role = state.scenario.role || $('#roleSelect').value || 'MT';
        state.scenario.throughSlide = state.throughSlideIndex;
        state.scenario.question = getThroughSlideQuestion(state.scenario, role, state.throughSlideIndex);
      } else {
        state.scenario = generatePositionScenario('through', state.throughSlideIndex);
      }
    }
    state.selected = null;
    state.answered = false;
    state.revealed = false;
    const rec = currentRecord();
    if(rec){
      rec.scenario = state.scenario;
      rec.answered = false;
      rec.selected = null;
      rec.revealed = false;
      rec.scored = false;
      rec.practiceLogged = false;
    }
    saveRecord();
    if(autoStart){
      // 実践セット開始時だけカウントダウンし、スライド遷移時はすぐ回答タイマーへ入る。
      startPracticeAnswerTimer();
    } else {
      resetPracticeRuntime();
      render();
    }
  }

  function movePracticeSlide(delta){
    if(!isPracticeMode()) return;
    const kind = practiceCurrentKind();
    const total = practiceSlideTotal(kind);
    const index = practiceCurrentSlideIndex();
    const nextIndex = index + delta;
    if(total <= 1 || nextIndex < 0 || nextIndex >= total) return;

    const wasPaused = state.practice.paused;
    const wasAnswerPhase = state.practice.phase === 'answer';

    // 実践待機中はスライドだけ移動し、タイマーは開始しない。
    if(!wasAnswerPhase){
      loadPracticeSlide(nextIndex, false);
      return;
    }

    // シークバー進行中は移動先スライドのシークバーをすぐ開始。
    // 一時停止中は移動先スライドに切り替えたうえで停止状態を維持する。
    loadPracticeSlide(nextIndex, true);
    if(wasPaused && state.practice.phase === 'answer'){
      state.practice.paused = true;
      state.practice.remainingMs = state.practice.slideTimeMs || practiceTimeForSlide(nextIndex, kind);
      state.practice.deadline = Date.now() + state.practice.remainingMs;
      updatePracticeTimerUi();
      render();
    }
  }

  function setPracticeThroughRevealStage(stage){
    state.practice.throughRevealStage = stage;
    render();
    updatePracticeTimerUi();
  }

  function runThroughDebuffRevealSequence(idx){
    const kind = practiceCurrentKind();
    const nextIndex = idx + 1;
    const stages = {
      0: {first:'gc1_core', second:'gc1_all', firstDelay:2000, secondDelay:5000, afterSecondDelay:1000},
      1: {first:'gc2_core', second:'gc2_all', firstDelay:2000, secondDelay:5000, afterSecondDelay:1000},
      2: {first:'gc3_all', second:null, firstDelay:2000, secondDelay:2000, afterSecondDelay:0}
    };
    const cfg = stages[idx];
    if(!cfg) return false;
    state.practice.phase = 'transition';
    updatePracticeTimerUi();
    state.practice.autoAdvanceTimer = setTimeout(() => {
      if(!isPracticeMode() || practiceCurrentKind() !== kind || practiceCurrentSlideIndex() !== idx) return;
      setPracticeThroughRevealStage(cfg.first);
      state.practice.autoAdvanceTimer = setTimeout(() => {
        if(!isPracticeMode() || practiceCurrentKind() !== kind || practiceCurrentSlideIndex() !== idx) return;
        if(cfg.second){
          setPracticeThroughRevealStage(cfg.second);
          state.practice.autoAdvanceTimer = setTimeout(() => loadPracticeSlide(nextIndex, true), cfg.afterSecondDelay);
        } else {
          loadPracticeSlide(nextIndex, true);
        }
      }, cfg.secondDelay);
    }, cfg.firstDelay);
    return true;
  }

  function runFloodGc3RevealSequence(idx){
    if(idx !== 0) return false;
    const kind = practiceCurrentKind();
    state.practice.phase = 'transition';
    updatePracticeTimerUi();
    state.practice.autoAdvanceTimer = setTimeout(() => {
      if(!isPracticeMode() || practiceCurrentKind() !== kind || practiceCurrentSlideIndex() !== idx) return;
      setPracticeThroughRevealStage('gc3_all');
      state.practice.autoAdvanceTimer = setTimeout(() => {
        if(!isPracticeMode() || practiceCurrentKind() !== kind || practiceCurrentSlideIndex() !== idx) return;
        loadPracticeSlide(1, true);
      }, 2000);
    }, 2000);
    return true;
  }

  function advancePracticeAfterResult(){
    if(!isPracticeMode()) return;
    const kind = practiceCurrentKind();
    const idx = practiceCurrentSlideIndex();
    const total = practiceSlideTotal(kind);
    if(kind === 'through' && idx <= 2 && runThroughDebuffRevealSequence(idx)) return;
    if(kind === 'floodGc3' && runFloodGc3RevealSequence(idx)) return;
    if(kind === 'debuffFlow' && idx < DEBUFF_FLOW_READ_TOTAL && runThroughDebuffRevealSequence(idx)) return;
    if(idx < total - 1){
      loadPracticeSlide(idx + 1, true);
    } else {
      showPracticeSummaryThenReset();
    }
  }

  function resetPracticeRuntime(){
    clearPracticeTimers();
    state.practice.active = false;
    state.practice.paused = false;
    state.practice.phase = 'idle';
    state.practice.countdown = practiceCountdownSeconds(practiceCurrentKind());
    state.practice.slideTimeMs = 0;
    state.practice.remainingMs = 0;
    state.practice.deadline = 0;
    state.practice.throughRevealStage = naturalPracticeRevealStageForSlide(practiceCurrentKind(), practiceCurrentSlideIndex());
    updatePracticeTimerUi();
  }

  function renderControlVisibility(){
    const isPractice = isPracticeMode();
    const prev = $('#prevBtn');
    const next = $('#nextBtn');
    const show = $('#showAnswerBtn');
    const one = $('#oneByOneToggle')?.closest('label');
    const practiceControls = $('#practiceControls');
    const mapOne = $('#mapOneByOneToggle')?.closest('label');
    const mapStart = $('#mapPracticeStartBtn');
    const mapPause = $('#mapPracticePauseBtn2');
    [prev, next].forEach(el => el?.classList.remove('practice-hidden'));
    [show].forEach(el => el?.classList.toggle('practice-hidden', isPractice));
    one?.classList.remove('practice-hidden');
    practiceControls?.classList.remove('show');
    mapOne?.classList.toggle('practice-hidden', !isPractice);
    mapStart?.classList.toggle('practice-hidden', !isPractice);
    mapPause?.classList.toggle('practice-hidden', !isPractice);
    updatePracticeTimerUi();
  }

  function clearAutoTimer(){
    if(state.autoTimer){
      clearTimeout(state.autoTimer);
      state.autoTimer = null;
    }
  }

  function withPreservedScroll(fn){
    const x = window.scrollX || window.pageXOffset || 0;
    const y = window.scrollY || window.pageYOffset || 0;
    preservedScrollTarget = {x, y, until: performance.now() + 800};
    document.activeElement?.blur?.();
    fn();
    restoreScrollPosition(x, y, true);
    setTimeout(() => {
      if(preservedScrollTarget?.x === x && preservedScrollTarget?.y === y){
        preservedScrollTarget = null;
      }
    }, 850);
  }

  function restoreScrollPosition(x, y, persistent = false){
    const restore = () => window.scrollTo(x, y);
    requestAnimationFrame(restore);
    setTimeout(restore, 0);
    setTimeout(restore, 50);
    if(persistent){
      setTimeout(restore, 120);
      setTimeout(restore, 250);
      setTimeout(restore, 500);
      setTimeout(restore, 800);
    }
  }

  function currentRecord(){
    return state.history[state.historyIndex] || null;
  }

  function applyRecord(record){
    state.scenario = record.scenario;
    state.answered = !!record.answered;
    state.selected = record.selected ?? null;
    state.revealed = !!record.revealed;
  }

  function saveRecord(){
    const rec = currentRecord();
    if(!rec) return;
    rec.scenario = state.scenario;
    rec.answered = state.answered;
    rec.selected = state.selected;
    rec.revealed = state.revealed;
  }

  function isPositionQuestion(){
    return state.mode === 'position';
  }

  function positionKindFromTab(){
    if(state.tab === 'gc1') return state.floodVariant === 'withGc3' ? 'floodGc3' : 'flood';
    if(state.tab === 'gc2') return 'debuffFlow';
    if(state.tab === 'gc3') return 'magicCharge';
    return 'through';
  }

  function positionSlideTotal(kind){
    if(kind === 'floodGc3') return 2;
    if(kind === 'debuffFlow') return DEBUFF_FLOW_POSITION_TOTAL;
    if(kind === 'magicCharge') return 3;
    if(kind === 'through') return THROUGH_TOTAL;
    return 1;
  }

  function positionSlideIndexOfScenario(sc = state.scenario){
    if(!sc) return 0;
    if(sc.positionKind === 'debuffFlow') return sc.debuffFlowSlide || 0;
    if(sc.positionKind === 'magicCharge') return sc.magicSlide || 0;
    if(sc.positionKind === 'through') return sc.throughSlide || 0;
    if(sc.positionKind === 'floodGc3') return sc.floodGc3Slide ?? floodGc3LocalSlide(sc.throughSlide || 0);
    return 0;
  }

  function currentSelectionIsCorrect(){
    const q = state.scenario?.question;
    if(!q) return false;
    if(q.debuffSet1Board) return p4DebuffSet1SelectionIsCorrect(currentDebuffSet1Selection(), q);
    if(q.aoeGazeBoard) return p4GazeAoeSelectionIsCorrect(currentGazeAoeSelection(), q);
    if(q.debuffSet2Board) return p4DebuffSet2SelectionIsCorrect(currentDebuffSet2Selection(), q);
    if(q.lateGazeBoard) return p4LateGazeSelectionIsCorrect(currentLateGazeSelection(), q);
    if(q.aoeBoard) return p4AoeQuestionPointIsCorrect(state.selected, q);
    if(q.correct !== undefined) return state.selected === q.correct;
    return false;
  }

  function canRetryCurrentAnswer(){
    return isPositionQuestion()
      && !state.oneByOne
      && state.answered
      && !state.revealed
      && !currentSelectionIsCorrect();
  }

  function answerLocked(){
    if(isPracticeMode()){
      return state.practice.phase !== 'answer' || state.practice.paused || (state.answered && !canRetryCurrentAnswer());
    }
    return state.answered && !canRetryCurrentAnswer();
  }

  function finalizeAnswerResult(ok){
    if(isPracticeMode()){
      // 実践中は回答入力だけを記録し、シークバーが終わるまで正誤表示・遷移をしない。
      state.answered = false;
      state.revealed = false;
      saveRecord();
      render();
      updatePracticeTimerUi();
      return;
    }
    if(isPositionQuestion() && !state.oneByOne && ok){
      state.revealed = true;
      saveRecord();
      render();
      state.autoTimer = setTimeout(advancePositionAfterCorrect, 900);
      return;
    }
    saveRecord();
    render();
    if(!isPositionQuestion() && !state.oneByOne && ok){
      state.autoTimer = setTimeout(newQuestion, 950);
    }
  }

  function newPositionQuestionAtSlide(slideIndex = 0){
    clearAutoTimer();
    const kind = positionKindFromTab();
    const total = positionSlideTotal(kind);
    const idx = Math.max(0, Math.min(total - 1, slideIndex));
    if(kind === 'debuffFlow') state.debuffFlowSlideIndex = idx;
    if(kind === 'magicCharge') state.magicSlideIndex = idx;
    if(kind === 'through') state.throughSlideIndex = idx;
    if(kind === 'floodGc3') state.floodGc3SlideIndex = idx;
    const scenario = generatePositionScenario(kind, idx);
    pushRecord(scenario);
    render();
  }

  function advancePositionAfterCorrect(){
    const meta = getCurrentPositionSlideMeta();
    if(!meta) return;
    if(meta.index < meta.total - 1){
      loadPositionSlide(meta.kind, meta.index + 1);
    } else {
      newPositionQuestionAtSlide(0);
    }
  }

  function pushRecord(scenario){
    if(state.historyIndex < state.history.length - 1){
      state.history = state.history.slice(0, state.historyIndex + 1);
    }
    const record = {scenario, answered:false, selected:null, revealed:false, scored:false};
    state.history.push(record);
    state.historyIndex = state.history.length - 1;
    applyRecord(record);
  }

  function newQuestion(){
    clearAutoTimer();
    let scenario;
    if(state.mode === 'practice'){
      const kind = practiceKindFromTab();
      state.practice.log = [];
      state.debuffFlowSlideIndex = 0;
      state.magicSlideIndex = 0;
      state.throughSlideIndex = 0;
      state.floodGc3SlideIndex = 0;
      scenario = generatePositionScenario(kind, 0);
    } else if(state.mode === 'position'){
      const kind = positionKindFromTab();
      if(kind === 'debuffFlow'){
        const currentSlide = state.scenario?.positionKind === 'debuffFlow'
          ? (state.scenario.debuffFlowSlide || 0)
          : (state.debuffFlowSlideIndex || 0);
        state.debuffFlowSlideIndex = ((currentSlide % DEBUFF_FLOW_POSITION_TOTAL) + DEBUFF_FLOW_POSITION_TOTAL) % DEBUFF_FLOW_POSITION_TOTAL;
        scenario = generatePositionScenario(kind, state.debuffFlowSlideIndex);
      } else if(kind === 'magicCharge'){
        const currentSlide = state.scenario?.positionKind === 'magicCharge'
          ? (state.scenario.magicSlide || 0)
          : (state.magicSlideIndex || 0);
        state.magicSlideIndex = ((currentSlide % 3) + 3) % 3;
        scenario = generatePositionScenario(kind, state.magicSlideIndex);
      } else if(kind === 'through'){
        const currentSlide = state.scenario?.positionKind === 'through'
          ? (state.scenario.throughSlide || 0)
          : (state.throughSlideIndex || 0);
        state.throughSlideIndex = ((currentSlide % THROUGH_TOTAL) + THROUGH_TOTAL) % THROUGH_TOTAL;
        scenario = generatePositionScenario(kind, state.throughSlideIndex);
      } else if(kind === 'floodGc3'){
        const currentSlide = state.scenario?.positionKind === 'floodGc3'
          ? positionSlideIndexOfScenario(state.scenario)
          : (state.floodGc3SlideIndex || 0);
        state.floodGc3SlideIndex = ((currentSlide % 2) + 2) % 2;
        scenario = generatePositionScenario(kind, state.floodGc3SlideIndex);
      } else {
        scenario = generatePositionScenario(kind);
      }
    } else {
      scenario = state.tab === 'magic'
        ? generateMagicCharge()
        : (state.tab === 'gc3' ? generateGC3() : generateGC12(state.tab === 'gc1' ? 1 : 2));
    }
    pushRecord(scenario);
    if(isPracticeMode()) resetPracticeRuntime();
    render();
  }

  function prevQuestion(){
    clearAutoTimer();
    if(isPracticeMode()) clearPracticeTimers();
    saveRecord();
    if(state.historyIndex <= 0) return;
    state.historyIndex--;
    applyRecord(currentRecord());
    $('#roleSelect').value = state.scenario.role;
    if(isPracticeMode()) resetPracticeRuntime();
    render();
  }

  function rebuildQuestionForCurrentRole(){
    const sc = state.scenario;
    const role = sc.role;
    if(state.mode === 'practice'){
      sc.role = role;
      if(sc.positionKind === 'flood'){
        sc.question = makeFloodPositionQuestion(role, sc.party, sc.exTruth, sc.beamTruth, sc.floodConfig);
      } else if(sc.positionKind === 'debuffFlow'){
        sc.question = getDebuffFlowPositionSlideQuestion(sc, role, sc.debuffFlowSlide || 0);
      } else if(sc.positionKind === 'magicCharge'){
        const magicBoard = sc.magicBoard || sc.question?.aoeBoard || makeP4AoeConfig('thunderCharge');
        const fresh = generatePositionScenario('magicCharge', sc.magicSlide || 0, magicBoard);
        fresh.role = role;
        state.scenario = fresh;
      } else if(sc.positionKind === 'through'){
        sc.question = getThroughSlideQuestion(sc, role, sc.throughSlide || 0);
      } else if(sc.positionKind === 'floodGc3'){
        sc.question = getFloodGc3SlideQuestion(sc, role, positionSlideIndexOfScenario(sc));
      }
      return;
    }
    if(state.mode === 'position'){
      if(sc.positionKind === 'flood'){
        sc.question = makeFloodPositionQuestion(role, sc.party, sc.exTruth, sc.beamTruth, sc.floodConfig);
      } else if(sc.positionKind === 'debuffFlow'){
        sc.role = role;
        sc.question = getDebuffFlowPositionSlideQuestion(sc, role, sc.debuffFlowSlide || 0);
      } else if(sc.positionKind === 'magicCharge'){
        const magicBoard = sc.magicBoard || sc.question?.aoeBoard || makeP4AoeConfig('thunderCharge');
        const fresh = generatePositionScenario('magicCharge', sc.magicSlide || 0, magicBoard);
        fresh.role = role;
        state.scenario = fresh;
      } else if(sc.positionKind === 'through'){
        sc.role = role;
        sc.question = getThroughSlideQuestion(sc, role, sc.throughSlide || 0);
      } else if(sc.positionKind === 'floodGc3'){
        sc.role = role;
        sc.question = getFloodGc3SlideQuestion(sc, role, positionSlideIndexOfScenario(sc));
      } else if(sc.positionKind === 'set1'){
        sc.question = makeSet1PositionQuestion(role, sc.party, sc.exTruth);
      } else {
        sc.question = makeSet2PositionQuestion(role, sc.party, sc.exTruth);
      }
      return;
    }
    if(sc.magic){
      sc.role = role;
      sc.question.prompt = `あなたは ${role} です。
1セット目は雷床、2セット目は氷床をチャージします。
チャージ時の安置を覚えて、2セット目終了後のマジックアウトでどちらを踏むか判断してください。`;
      return;
    }
    if(sc.round === 3){
      sc.question = makeGC3Question(role, sc.party, sc.exTruth, sc.beamTruth);
      return;
    }
    const q = chooseGC12Question(sc.party, role, sc.exTruth, sc.chaosTruth, sc.round, sc.firstWaterLightningTiming, sc.waterLightningTiming);
    if(q){
      sc.question = q;
      return;
    }
    const fresh = generateGC12(sc.round);
    fresh.role = role;
    const freshQ = chooseGC12Question(fresh.party, role, fresh.exTruth, fresh.chaosTruth, fresh.round, fresh.firstWaterLightningTiming, fresh.waterLightningTiming);
    fresh.question = freshQ;
    state.scenario = fresh;
  }

  function makeNoTargetQuestion(role, round){
    return {
      type:'回答対象なし',
      prompt:`あなたは ${role} です。
この問題では、${role} に水雷・加速度・叫声の回答対象デバフがありません。`,
      note:'パーティーリストで別ロールを選ぶか、「別の問題」を押してください。デバフは別の問題まで付け直されません。',
      options:[{key:'none',label:'対象デバフなし'}],
      correct:'none',
      noScore:true,
      explanation:'このロールには、この問題で回答する対象デバフがありません。'
    };
  }

  function changeSelfRole(role){
    clearAutoTimer();
    if(isPracticeMode()) clearPracticeTimers();
    if(!state.scenario) return;
    $('#roleSelect').value = role;
    state.scenario.role = role;
    rebuildQuestionForCurrentRole();
    state.answered = false;
    state.selected = null;
    state.revealed = false;
    saveRecord();
    if(isPracticeMode()) resetPracticeRuntime();
    render();
  }


  function answerAoePoint(pt){
    if(answerLocked()) return;
    const q = state.scenario.question;
    if(!q.aoeBoard) return;
    state.answered = true;
    state.selected = pt;
    state.revealed = false;
    const ok = p4AoeQuestionPointIsCorrect(pt, q);
    const rec = currentRecord();
    if(!isPracticeMode() && rec && !rec.scored && !q.noScore){
      state.stats[activeStatKey()].total++;
      if(ok) state.stats[activeStatKey()].ok++;
      rec.scored = true;
    }
    finalizeAnswerResult(ok);
  }

  function currentGazeAoeSelection(){
    const s = state.selected;
    if(s && typeof s === 'object' && !Array.isArray(s)) return {...s};
    return {};
  }

  function p4GazeAoePointIsCorrect(pt, board){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number') return false;
    const thunderTruth = typeof board.thunderTruth === 'boolean' ? board.thunderTruth : true;
    return p4AoePointInCircle(pt) && p4AoeThunderSafeByTruth(pt, board, thunderTruth);
  }

  function p4GazeAoeSelectionIsCorrect(sel, q){
    const accelOk = !q.accelCheck?.required || sel.accel === q.accelCheck.correct;
    return p4GazeAoePointIsCorrect(sel.point, q.aoeGazeBoard) && sel.direction === q.correctDirection && accelOk;
  }

  function gazeDirectionLabel(key){
    return key === 'out' ? '見ない（外）' : '見る（内）';
  }

  function p4FacingMarkerAngle(pt, direction){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number' || !direction) return 0;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    if(Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) return direction === 'in' ? 180 : 0;
    let deg = Math.atan2(dx, -dy) * 180 / Math.PI;
    if(direction === 'in') deg += 180;
    return deg;
  }

  function clampPercent(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function tryFinalizeGazeAoeAnswer(){
    const q = state.scenario.question;
    if(!q.aoeGazeBoard) return;
    const sel = currentGazeAoeSelection();
    state.selected = sel;
    if(!sel.point || !sel.direction || (q.accelCheck?.required && !sel.accel)){
      saveRecord();
      render();
      return;
    }
    state.answered = true;
    state.revealed = false;
    const ok = p4GazeAoeSelectionIsCorrect(sel, q);
    const rec = currentRecord();
    if(!isPracticeMode() && rec && !rec.scored && !q.noScore){
      state.stats[activeStatKey()].total++;
      if(ok) state.stats[activeStatKey()].ok++;
      rec.scored = true;
    }
    finalizeAnswerResult(ok);
  }

  function answerGazeAoePoint(pt){
    if(answerLocked()) return;
    const q = state.scenario.question;
    if(!q.aoeGazeBoard) return;
    clearAutoTimer();
    const sel = currentGazeAoeSelection();
    sel.point = pt;
    state.selected = sel;
    state.answered = false;
    state.revealed = false;
    tryFinalizeGazeAoeAnswer();
  }

  function answerGazeDirection(key){
    if(answerLocked()) return;
    const q = state.scenario.question;
    if(!q.aoeGazeBoard) return;
    clearAutoTimer();
    const sel = currentGazeAoeSelection();
    sel.direction = key;
    state.selected = sel;
    state.answered = false;
    state.revealed = false;
    tryFinalizeGazeAoeAnswer();
  }

  function answerGazeAccel(key){
    if(answerLocked()) return;
    const q = state.scenario.question;
    if(!q.aoeGazeBoard || !q.accelCheck?.required) return;
    clearAutoTimer();
    const sel = currentGazeAoeSelection();
    sel.accel = key;
    state.selected = sel;
    state.answered = false;
    state.revealed = false;
    tryFinalizeGazeAoeAnswer();
  }

  function answerPart(index, key){
    const q = state.scenario.question;
    const part = q.parts?.[index];
    if(!part || part.answered) return;

    part.answered = true;
    part.selected = key;
    part.revealed = false;

    const ok = key === part.correct;
    if(!part.scored){
      state.stats[activeStatKey()].total++;
      if(ok) state.stats[activeStatKey()].ok++;
      part.scored = true;
    }

    state.answered = q.parts.every(p => p.answered);
    saveRecord();
    render();

    if(!state.oneByOne && state.answered && q.parts.every(p => p.selected === p.correct)){
      state.autoTimer = setTimeout(newQuestion, 950);
    }
  }

  function answer(key){
    if(answerLocked()) return;
    state.answered = true;
    state.selected = key;
    state.revealed = false;
    const ok = key === state.scenario.question.correct;
    const rec = currentRecord();
    if(!isPracticeMode() && rec && !rec.scored && !state.scenario.question.noScore){
      state.stats[activeStatKey()].total++;
      if(ok) state.stats[activeStatKey()].ok++;
      rec.scored = true;
    }
    finalizeAnswerResult(ok);
  }

  function showAnswer(){
    if(state.revealed) return;
    clearAutoTimer();
    const q = state.scenario.question;
    if(q.debuffSet1Board){
      state.answered = true;
      state.selected = null;
      state.revealed = true;
      saveRecord();
      render();
      return;
    }

    if(q.aoeGazeBoard){
      state.answered = true;
      state.selected = null;
      state.revealed = true;
      saveRecord();
      render();
      return;
    }
    if(q.aoeBoard){
      state.answered = true;
      state.selected = null;
      state.revealed = true;
      saveRecord();
      render();
      return;
    }
    if(q.debuffSet2Board){
      state.answered = true;
      state.selected = null;
      state.revealed = true;
      saveRecord();
      render();
      return;
    }
    if(q.lateGazeBoard){
      state.answered = true;
      state.selected = null;
      state.revealed = true;
      saveRecord();
      render();
      return;
    }
    if(q.parts){
      q.parts.forEach(part => {
        if(!part.answered){
          part.answered = true;
          part.selected = null;
          part.revealed = true;
        }
      });
      state.answered = true;
      state.selected = null;
      state.revealed = true;
      saveRecord();
      render();
      return;
    }
    state.answered = true;
    state.selected = null;
    state.revealed = true;
    saveRecord();
    render();
  }

  function currentDebuffFlowProgressIndex(sc = state.scenario){
    if(!sc || (state.mode !== 'position' && state.mode !== 'practice')) return -1;
    if(sc.positionKind === 'debuffFlow') return (sc.debuffFlowSlide || 0) - DEBUFF_FLOW_READ_TOTAL;
    if(sc.positionKind === 'through' || sc.positionKind === 'floodGc3'){
      const src = throughSourceForSlide(sc.throughSlide || 0);
      if(src.kind === 'debuffFlow') return src.localIndex ?? -1;
      if(src.kind === 'magicCharge') return DEBUFF_FLOW_TOTAL;
    }
    return -1;
  }

  function positionDebuffResolved(sc, d){
    const idx = currentDebuffFlowProgressIndex(sc);
    if(idx < 0 || !d) return false;
    if(sc?.positionKind === 'through' && (sc.throughSlide || 0) >= 4 && ['allagan','trans','dead','living'].includes(d.type)) return true;
    if(idx >= 1 && ['water','lightning'].includes(d.type) && d.timing === 'early') return true;
    if(idx >= 2 && d.type === 'gaze' && d.timing === 'early') return true;
    if(idx >= 1 && d.type === 'accel' && d.timing === 'early') return true;
    if(idx >= 4 && d.type === 'fire') return true;
    if(idx >= 5 && ['water','lightning'].includes(d.type) && d.timing === 'late') return true;
    if(idx >= 5 && d.type === 'accel' && d.timing === 'late') return true;
    if(idx >= 6 && d.type === 'gaze' && d.timing === 'late') return true;
    if(idx >= 8 && d.type === 'waterChaos') return true;
    return false;
  }

  function partyListTruthForDebuff(sc, d){
    if(!sc || !d) return null;

    // 通し3・4枚目では、GC1/2由来デバフとGC3由来デバフが同時に表示される。
    // GC1/2由来はデバフ処理側の真偽、GC3由来は3回目GC側の真偽を見る。
    if(sc.positionKind === 'through' || sc.positionKind === 'floodGc3'){
      if(['water','lightning','accel','gaze'].includes(d.type)) return !!sc.debuff?.exTruth;
      if(['fire','waterChaos'].includes(d.type)) return !!sc.debuff?.chaosTruth;
      if(['allagan','trans','dead','living'].includes(d.type)) return !!(sc.flood?.exTruth ?? sc.exTruth);
      return null;
    }

    if(sc.round === 1 || sc.round === 2){
      if(['water','lightning','accel','gaze'].includes(d.type)) return !!sc.exTruth;
      if(['fire','waterChaos'].includes(d.type)) return !!sc.chaosTruth;
      return null;
    }
    if(sc.round === 3){
      if(['allagan','trans','dead','living'].includes(d.type)) return !!sc.exTruth;
    }
    return null;
  }

  function isPracticeThroughScenario(sc = state.scenario){
    return isPracticeMode() && (sc?.positionKind === 'through' || sc?.positionKind === 'floodGc3');
  }

  function isPracticeDebuffFlowScenario(sc = state.scenario){
    return isPracticeMode() && sc?.positionKind === 'debuffFlow';
  }

  function throughMasterParty(sc){
    if(!sc?.debuff || !sc?.flood) return sc?.party || makeEmptyParty();
    return mergeParties(sc.debuff.party, sc.flood.party);
  }

  function throughVisibleDebuffs(sc, role){
    const ds = (throughMasterParty(sc)[role] || []).map(d => ({...d}));
    if(!isPracticeThroughScenario(sc)) return ds;
    const stage = state.practice.throughRevealStage || 'none';
    if(stage === 'none') return [];
    const isGc12 = (d) => ['water','lightning','accel','gaze','fire','waterChaos'].includes(d.type);
    const isChaos = (d) => ['fire','waterChaos'].includes(d.type);
    const isGc3 = (d) => ['allagan','trans','dead','living'].includes(d.type);
    return ds.filter(d => {
      if(stage === 'gc1_core') return d.sourceRound === 1 && !isChaos(d);
      if(stage === 'gc1_all') return d.sourceRound === 1;
      if(stage === 'gc2_core') return d.sourceRound === 1 || (d.sourceRound === 2 && !isChaos(d));
      if(stage === 'gc2_all') return d.sourceRound === 1 || d.sourceRound === 2;
      if(stage === 'gc3_all') return (isGc12(d) && (d.sourceRound === 1 || d.sourceRound === 2)) || isGc3(d);
      return ds;
    });
  }

  function debuffFlowVisibleDebuffs(sc, role){
    const sourceParty = sc?.fullParty || sc?.party || makeEmptyParty();
    const ds = (sourceParty[role] || []).map(d => ({...d}));
    if(!isPracticeDebuffFlowScenario(sc)) return ds;
    const stage = state.practice.throughRevealStage || 'none';
    const isChaos = (d) => ['fire','waterChaos'].includes(d.type);
    return ds.filter(d => {
      if(stage === 'none') return false;
      if(stage === 'gc1_core') return d.sourceRound === 1 && !isChaos(d);
      if(stage === 'gc1_all') return d.sourceRound === 1;
      if(stage === 'gc2_core') return d.sourceRound === 1 || (d.sourceRound === 2 && !isChaos(d));
      if(stage === 'gc2_all') return d.sourceRound === 1 || d.sourceRound === 2;
      return true;
    });
  }

  function partyDebuffsForRender(sc, role){
    if(isPracticeThroughScenario(sc)){
      return throughVisibleDebuffs(sc, role).filter(d => !positionDebuffResolved(sc, d));
    }
    if(isPracticeDebuffFlowScenario(sc)){
      return debuffFlowVisibleDebuffs(sc, role).filter(d => !positionDebuffResolved(sc, d));
    }
    return sc.party[role] || [];
  }

  function renderDebuffBadgesInto(badges, sc, role){
    badges.innerHTML = '';
    const ds = partyDebuffsForRender(sc, role);
    if(ds.length === 0){
      const b = document.createElement('span');
      b.className = 'badge empty';
      b.textContent = 'なし';
      badges.appendChild(b);
      return;
    }
    sortDebuffsForPartyList(ds).forEach(d => {
      const truth = partyListTruthForDebuff(sc, d);
      const resolved = positionDebuffResolved(sc, d);
      const wrap = document.createElement('span');
      wrap.className = `badge-wrap${state.showDebuffDetails ? '' : ' icon-wrap'}${resolved ? ' resolved-debuff' : ''}`;
      if(state.showPartyTruth && truth !== null){
        const t = document.createElement('span');
        t.className = `truthmark badge-truth ${truth ? 'true-mark' : 'false-mark'}`;
        t.title = truth ? '真' : '偽';
        t.setAttribute('aria-label', truth ? '真' : '偽');
        if(!truth) t.textContent = '?';
        wrap.appendChild(t);
      }
      const b = document.createElement('span');
      b.className = `badge ${debuffClass(d)}${state.showDebuffDetails ? '' : ' icon-badge'}${(sc.round === 2 && d.sourceRound === 2) ? ' new-debuff' : ''}`;
      b.title = debuffHoverLabel(d);
      b.setAttribute('aria-label', debuffHoverLabel(d));
      if(state.showDebuffDetails){
        b.textContent = debuffLabelForPartyList(d);
      } else {
        const img = document.createElement('img');
        img.className = 'debuff-icon';
        img.src = debuffIconSrc(d.type);
        img.alt = debuffHoverLabel(d);
        b.appendChild(img);
        const tText = timerLabel(d);
        if(tText){
          const time = document.createElement('span');
          time.className = 'icon-time';
          time.textContent = tText;
          b.appendChild(time);
        }
      }
      wrap.appendChild(b);
      badges.appendChild(wrap);
    });
  }

  function p4AoeIceClipRect(zone){
    const rects = {

      B:{x:50,y:0,w:50,h:50},

  function p4AoeAnswerSvg(board){
    const uid = `p4Aoe_${Math.floor(Math.random()*1000000)}`;
    const showThunder = board.phase === 'thunderCharge' || board.phase === 'magicOut' || board.phase === 'readBoth';
    const showIce = board.phase === 'iceCharge' || board.phase === 'magicOut' || board.phase === 'readBoth';
    const rotation = board.light.slope === 'up' ? 'rotate(-45 50 50)' : 'rotate(45 50 50)';
    const safeBands = board.phase === 'magicOut'
      ? p4AoeActualLightningSafeBands(board, 'out')
      : p4AoeActualLightningSafeBands(board, 'charge');
    const safeZones = board.phase === 'magicOut'
      ? p4AoeActualIceSafeZones(board, 'out')
      : p4AoeActualIceSafeZones(board, 'charge');

    const pattern = `
      <pattern id="${uid}_stripe" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
        <rect width="5" height="5" fill="rgba(112,227,160,0.12)"></rect>
        <line x1="0" y1="0" x2="0" y2="5" stroke="rgba(112,227,160,0.95)" stroke-width="2.0"></line>
      </pattern>`;

    if(showThunder && showIce){
      const clipDefs = safeZones.map(zone => {
        const r = p4AoeIceClipRect(zone);
        return `<clipPath id="${uid}_ice_${zone}"><rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}"></rect></clipPath>`;
      }).join('');
      const shapes = safeZones.map(zone => {
        const bandRects = safeBands.map(idx => `<rect class="aoe-answer-fill" x="${idx*25}" y="-50" width="25" height="200" fill="url(#${uid}_stripe)"></rect>`).join('');
        return `<g clip-path="url(#${uid}_ice_${zone})"><g transform="${rotation}">${bandRects}</g></g>`;
      }).join('');
      return `<defs>${pattern}${clipDefs}</defs>${shapes}`;
    }
    if(showThunder){
      const bandRects = safeBands.map(idx => `<rect class="aoe-answer-fill" x="${idx*25}" y="-50" width="25" height="200" fill="url(#${uid}_stripe)"></rect>`).join('');
      return `<defs>${pattern}</defs><g transform="${rotation}">${bandRects}</g>`;
    }
    const zoneRects = safeZones.map(zone => {
      const r = p4AoeIceClipRect(zone);
      return `<rect class="aoe-answer-fill" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="url(#${uid}_stripe)"></rect>`;
    }).join('');
    return `<defs>${pattern}</defs>${zoneRects}`;
  }

  function getCurrentPositionSlideMeta(){
    if(state.mode === 'practice'){
      const kind = practiceCurrentKind();
      return {kind, index: practiceCurrentSlideIndex(), total: practiceSlideTotal(kind)};
    }
    if(state.mode !== 'position') return null;
    if(state.tab === 'gc1'){
      const kind = positionKindFromTab();
      return {kind, index: kind === 'floodGc3' ? positionSlideIndexOfScenario(state.scenario) : 0, total:positionSlideTotal(kind)};
    }
    if(state.tab === 'gc2') return {kind:'debuffFlow', index: state.scenario?.debuffFlowSlide || 0, total:DEBUFF_FLOW_POSITION_TOTAL};
    if(state.tab === 'gc3') return {kind:'magicCharge', index: state.scenario?.magicSlide || 0, total:3};
    if(state.tab === 'magic') return {kind:'through', index: state.scenario?.throughSlide || 0, total:THROUGH_TOTAL};
    return null;
  }

  function loadPositionSlide(kind, index){
    clearAutoTimer();
    const total = positionSlideTotal(kind);
    const clampedIndex = Math.max(0, Math.min(total - 1, index));
    if(kind === 'debuffFlow'){
      state.debuffFlowSlideIndex = clampedIndex;
      if(state.scenario?.positionKind === 'debuffFlow'){
        const role = state.scenario.role || $('#roleSelect').value || 'MT';
        state.scenario.debuffFlowSlide = state.debuffFlowSlideIndex;
        state.scenario.question = getDebuffFlowPositionSlideQuestion(state.scenario, role, state.debuffFlowSlideIndex);
      } else {
        state.scenario = generatePositionScenario(kind, state.debuffFlowSlideIndex);
      }
    } else if(kind === 'magicCharge'){
      state.magicSlideIndex = clampedIndex;
      const magicBoard = state.scenario?.magicBoard || state.scenario?.question?.aoeBoard || makeP4AoeConfig('thunderCharge');
      state.scenario = generatePositionScenario(kind, state.magicSlideIndex, magicBoard);
    } else if(kind === 'through'){
      state.throughSlideIndex = clampedIndex;
      if(state.scenario?.positionKind === 'through'){
        const role = state.scenario.role || $('#roleSelect').value || 'MT';
        state.scenario.throughSlide = state.throughSlideIndex;
        state.scenario.question = getThroughSlideQuestion(state.scenario, role, state.throughSlideIndex);
      } else {
        state.scenario = generatePositionScenario(kind, state.throughSlideIndex);
      }
    } else if(kind === 'floodGc3'){
      state.floodGc3SlideIndex = clampedIndex;
      if(state.scenario?.positionKind === 'floodGc3'){
        const role = state.scenario.role || $('#roleSelect').value || 'MT';
        state.scenario.floodGc3Slide = state.floodGc3SlideIndex;
        state.scenario.question = getFloodGc3SlideQuestion(state.scenario, role, state.floodGc3SlideIndex);
      } else {
        state.scenario = generatePositionScenario(kind, state.floodGc3SlideIndex);
      }
    } else {
      return;
    }
    state.selected = null;
    state.answered = false;
    state.revealed = false;
    saveRecord();
    render();
  }

  function movePositionSlide(delta){
    const meta = getCurrentPositionSlideMeta();
    if(!meta || meta.total <= 1 || !['debuffFlow','magicCharge','through','floodGc3'].includes(meta.kind)) return;
    const nextIndex = meta.index + delta;
    if(nextIndex < 0 || nextIndex >= meta.total) return;
    loadPositionSlide(meta.kind, nextIndex);
  }

  function movePositionSlideButton(delta){
    const meta = getCurrentPositionSlideMeta();
    if(!meta || meta.total <= 1 || !['debuffFlow','magicCharge','through','floodGc3'].includes(meta.kind)) return;
    const nextIndex = meta.index + delta;
    if(nextIndex >= 0 && nextIndex < meta.total){
      loadPositionSlide(meta.kind, nextIndex);
      return;
    }
    if(delta > 0 && meta.index >= meta.total - 1){
      newPositionQuestionAtSlide(0);
      return;
    }
    if(delta < 0 && meta.index <= 0){
      prevQuestion();
      const after = getCurrentPositionSlideMeta();
      if(after && after.kind === meta.kind && after.total > 1){
        loadPositionSlide(after.kind, after.total - 1);
      }
    }
  }

  function p4DebuffSet2AreaAtPoint(pt, config){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number' || !config) return null;
    let best = null;
    let bestDist = Infinity;
    (config.targetAreas || []).forEach(area => {
      const dx = pt.x - area.x;
      const dy = pt.y - area.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if(dist <= area.r && dist < bestDist){
        best = area;
        bestDist = dist;
      }
    });
    return best;
  }

  function p4LateGazePointPosition(pt, q){
    if(!pt || !q?.lateGazeBoard || !p4AoePointInCircle(pt)) return null;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if(dist <= q.lateGazeBoard.centerRadius) return 'inside';
    if(dist >= q.lateGazeBoard.targetRadius) return 'outside';
    return 'middle';
  }

  function p4LateGazeSelectionIsCorrect(sel, q){
    const pt = lateGazePointFromSelection(sel);
    if(!pt || !q?.lateGazeBoard) return false;
    const accelOk = !q.accelCheck?.required || sel.accel === q.accelCheck.correct;
    return p4LateGazePointPosition(pt, q) === q.correctPosition && sel.direction === q.correctDirection && accelOk;
  }

  function tryFinalizeLateGazeAnswer(){
    const q = state.scenario.question;
    if(!q.lateGazeBoard) return;
    const sel = currentLateGazeSelection();
    state.selected = sel;
    if(!sel.point || !sel.direction || (q.accelCheck?.required && !sel.accel)){
      state.answered = false;
      saveRecord();
      render();
      return;
    }
    state.answered = true;
    state.revealed = false;
    const ok = p4LateGazeSelectionIsCorrect(sel, q);
    const rec = currentRecord();
    if(!isPracticeMode() && rec && !rec.scored && !q.noScore){
      state.stats[activeStatKey()].total++;
      if(ok) state.stats[activeStatKey()].ok++;
      rec.scored = true;
    }
    finalizeAnswerResult(ok);
  }
