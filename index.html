<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P4 無の氾濫練習</title>
<style>
  :root{
    --bg:#0b1020;
    --panel:#141b31;
    --panel2:#101728;
    --line:#28344f;
    --text:#eef3ff;
    --muted:#9fb0cc;
    --accent:#86d5ff;
    --accent2:#ffd166;
    --ok:#63d471;
    --ng:#ff6b7a;
    --warn:#ffcf5a;
    --th:#7bdff2;
    --dps:#f7a8b8;
    --early:#5ed7ff;
    --late:#c7a7ff;
    --water:#65c7ff;
    --lightning:#ffe066;
    --accel:#ff9f43;
    --gaze:#b8f2e6;
    --fire:#ff7474;
    --void:#9d8cff;
    --allagan:#ffca3a;
    --trans:#8ac926;
    --dead:#a855f7;
    --living:#5eead4;
    --shadow:0 18px 45px rgba(0,0,0,.28);
    --radius:18px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 20% 0%, rgba(92,145,255,.18), transparent 32rem),
      radial-gradient(circle at 80% 20%, rgba(255,125,180,.10), transparent 36rem),
      var(--bg);
    min-height:100vh;
  }
  a{color:#b9e6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  .app{max-width:1180px;margin:0 auto;padding:22px 16px 42px}
  header{
    display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
    margin-bottom:14px;
  }
  .title h1{font-size:clamp(22px,3.6vw,36px);margin:0 0 6px;letter-spacing:.02em}
  .title p{margin:0;color:var(--muted);line-height:1.55;font-size:14px}
  .links{font-size:12px;color:var(--muted);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .pilllink{border:1px solid #39516f;border-radius:999px;padding:5px 10px;color:#dcefff;background:rgba(255,255,255,.03)}
  .standalone-hidden{display:none!important}
    .mode-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0 10px}
  .mode-tab{
    appearance:none;border:1px solid var(--line);background:rgba(20,27,49,.9);color:var(--text);
    border-radius:999px;padding:12px 10px;font-weight:800;cursor:pointer;
    transition:.15s transform,.15s background,.15s border-color;
  }
  .mode-tab:hover{transform:translateY(-1px);border-color:#4e6388}
  .mode-tab.active{background:linear-gradient(135deg,rgba(255,168,134,.22),rgba(255,255,255,.06));border-color:#ffb18a;box-shadow:0 0 0 2px rgba(255,177,138,.08) inset}
  .variant-tabs{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    margin:0 0 14px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);
    background:rgba(16,23,40,.58);
  }
  .variant-tabs.hidden{display:none}
  .variant-label{font-size:13px;color:var(--muted);font-weight:850;margin-right:2px}
  .variant-tab{
    appearance:none;border:1px solid #334764;background:rgba(255,255,255,.035);color:#d8e7ff;
    border-radius:999px;padding:8px 12px;font-weight:850;cursor:pointer;
  }
  .variant-tab.active{background:linear-gradient(135deg,rgba(134,213,255,.22),rgba(255,255,255,.06));border-color:#86d5ff;color:#fff}

  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0 14px}
  .tabs.cols1{grid-template-columns:1fr}
  .tabs.cols3{grid-template-columns:repeat(3,1fr)}
  .tabs.cols4{grid-template-columns:repeat(4,1fr)}
  .tab{
    appearance:none;border:1px solid var(--line);background:rgba(20,27,49,.9);color:var(--text);
    border-radius:999px;padding:12px 10px;font-weight:750;cursor:pointer;
    transition:.15s transform,.15s background,.15s border-color;
  }
  .tab:hover{transform:translateY(-1px);border-color:#4e6388}
  .tab.active{background:linear-gradient(135deg,rgba(134,213,255,.24),rgba(255,209,102,.16));border-color:#75cfff;box-shadow:0 0 0 2px rgba(117,207,255,.08) inset}
  .tab.hidden{display:none}
  .controls{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    background:rgba(16,23,40,.78);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .controls label{font-size:13px;color:var(--muted)}
  .mode-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid #334764;background:rgba(255,255,255,.035);border-radius:999px;padding:8px 10px;font-weight:750;color:#d8e7ff}
  .mode-toggle input{accent-color:#86d5ff}
  select,button.action{
    border:1px solid #3b4e70;background:#0f1729;color:var(--text);border-radius:12px;padding:10px 12px;font-weight:700;
  }
  select{min-width:116px}
  button.action{cursor:pointer;background:linear-gradient(135deg,#254166,#172338)}
  button.action.secondary{background:#101728;color:#d8e7ff}
  button.action:hover{filter:brightness(1.12)}
  .score{margin-left:auto;font-size:13px;color:var(--muted)}
  .score strong{color:var(--accent2);font-size:16px}
  .layout{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:14px;align-items:start}
  .card{
    background:rgba(20,27,49,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;
  }
  .party-card{position:sticky;top:12px;max-height:calc(100vh - 24px);overflow:auto}
  .card h2,.card h3{margin:0}
  .card-head{padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}
  .card-head h2{font-size:18px}
  .party-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .party-display-toggles{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .party-truth-toggle{
    display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:12px;font-weight:800;
    border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.035);
    user-select:none;
  }
  .party-truth-toggle input{accent-color:#86d5ff}
  .card-head p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.45}
  .party{padding:12px;display:flex;flex-direction:column;gap:8px}
  .mobile-self-panel{display:none}
  .member{
    display:grid;grid-template-columns:48px 1fr;gap:8px;align-items:center;
    border:1px solid rgba(255,255,255,.07);background:rgba(15,23,41,.82);border-radius:13px;padding:8px;
    min-height:48px;cursor:pointer;transition:.12s border-color,.12s background,.12s transform;appearance:none;width:100%;color:inherit;text-align:left;font:inherit;
  }
  .member:hover{border-color:rgba(134,213,255,.55);background:rgba(22,35,61,.88);transform:translateY(-1px)}
  .member.you{border-color:rgba(255,209,102,.9);box-shadow:0 0 0 2px rgba(255,209,102,.13) inset;background:rgba(45,38,21,.5)}
  .role{font-weight:900;font-size:14px;display:flex;align-items:center;gap:5px}
  .role.th{color:var(--th)} .role.dps{color:var(--dps)}
  .youmark{font-size:10px;color:#111;background:var(--accent2);padding:2px 5px;border-radius:999px;line-height:1;font-weight:900}
  .badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:24px}
.badge-wrap{position:relative;display:inline-flex;align-items:flex-start;padding-top:8px}
  .badge-wrap.icon-wrap{
    width:48px;
    min-width:48px;
    height:50px;
    padding-top:7px;
    justify-content:center;
    align-items:flex-start;
    flex:0 0 48px;
  }
  .badge-wrap .badge-truth{position:absolute;left:50%;top:0;transform:translate(-50%,-16%);width:14px;height:14px;margin-left:0;z-index:2;border:1px solid rgba(255,255,255,.35)}
  .badge-wrap .badge-truth.true-mark{width:14px;height:14px;transform:translate(-50%,-16%)}
  .badge-wrap .badge-truth.false-mark{width:14px;height:14px;transform:translate(-50%,-16%);font-size:11px;line-height:14px;padding-bottom:1px}
  .badge-wrap.icon-wrap .badge-truth{width:16px;height:16px;transform:translate(-50%,-22%);}
  .badge-wrap.icon-wrap .badge-truth.true-mark{width:16px;height:16px;transform:translate(-50%,-22%);}
  .badge-wrap.icon-wrap .badge-truth.false-mark{width:16px;height:16px;transform:translate(-50%,-22%);font-size:13px;line-height:16px;padding-bottom:1px}
  .badge{
    font-size:11px;line-height:1;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:5px 7px;font-weight:850;white-space:nowrap;
    background:rgba(255,255,255,.08);color:#fff;display:inline-flex;align-items:center;gap:4px;min-height:24px;
  }
  .badge::before{display:inline-block;flex:0 0 auto}
  .badge.icon-badge{
    position:relative;
    width:44px;
    height:44px;
    min-width:44px;
    min-height:44px;
    padding:0;
    border:0;
    border-radius:0;
    background:transparent;
    box-shadow:none;
    overflow:visible;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .badge.icon-badge.new-debuff{box-shadow:none;text-decoration:none}
  .badge.icon-badge::before{content:none;display:none}
  .debuff-icon{width:44px;height:44px;object-fit:contain;object-position:center center;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))}
  .icon-time{
    position:absolute;right:0;bottom:0;z-index:3;
    min-width:18px;padding:1px 4px;border-radius:999px;
    background:rgba(15,23,41,.94);border:1px solid rgba(255,255,255,.32);
    color:#fff;font-size:9px;line-height:1.1;font-weight:1000;text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,.35);
  }
  .badge.water{background:rgba(101,199,255,.18);border-color:rgba(101,199,255,.55);color:#dff5ff}
  .badge.water::before{
    content:'💧';
    font-size:13px;
    line-height:1;
    filter:drop-shadow(0 0 3px rgba(125,211,252,.35));
  }
  .badge.lightning{background:linear-gradient(135deg,rgba(236,72,153,.34),rgba(56,189,248,.38));border-color:rgba(236,72,153,.62);color:#ffe0ef}
  .badge.accel{background:linear-gradient(135deg,rgba(34,197,94,.34),rgba(244,114,182,.34));border-color:rgba(74,222,128,.58);color:#eafff0}
  .badge.gaze{background:rgba(255,113,43,.20);border-color:rgba(255,113,43,.66);color:#ffd8c9}
  .badge.gaze::before{content:'';width:9px;height:9px;border-radius:999px;background:#fb923c;box-shadow:0 0 5px rgba(251,146,60,.5)}
  .badge.fire{background:rgba(255,0,0,.34);border-color:rgba(255,55,55,.78);color:#ffe1e1}
  .badge.fire::before{content:'♟';color:#ff1f1f;font-size:12px;line-height:1;text-shadow:0 0 5px rgba(255,31,31,.6)}
  .badge.waterChaos{background:rgba(0,125,255,.30);border-color:rgba(0,162,255,.78);color:#d5efff}
  .badge.waterChaos::before{content:'♟';color:#38bdf8;font-size:12px;line-height:1;text-shadow:0 0 5px rgba(56,189,248,.55)}
  .badge.allagan{background:rgba(255,202,58,.16);border-color:rgba(255,202,58,.56);color:#ffe7a2}
  .badge.allagan::before{content:'♟';color:#0b0b0f;font-size:12px;line-height:1;text-shadow:0 0 3px rgba(255,255,255,.35)}
  .badge.trans{background:rgba(139,92,246,.22);border-color:rgba(167,139,250,.62);color:#eadcff}
  .badge.trans::before{content:'♟';color:#c4b5fd;font-size:12px;line-height:1;text-shadow:0 0 5px rgba(196,181,253,.45)}
  .badge.dead{background:#173f9c;border-color:#7dd3fc;color:#d9f4ff}
  .badge.dead::before{content:'▼';color:#7dd3fc;font-size:10px;line-height:1}
  .badge.living{background:#1d3f9c;border-color:#d06bff;color:#f4d7ff}
  .badge.living::before{content:'⬟';color:#d06bff;font-size:10px;line-height:1}
  .badge.empty{color:#697a99;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);font-weight:700}
  .badge.new-debuff:not(.icon-badge){
    text-decoration:underline;
    text-decoration-thickness:2px;
    text-underline-offset:3px;
    box-shadow:0 0 0 2px rgba(255,209,102,.40), 0 0 10px rgba(255,209,102,.18);
  }
  .badge-wrap.resolved-debuff{
    opacity:.34;
    filter:grayscale(1);
  }
  .badge-wrap.resolved-debuff .badge{
    box-shadow:none;
    text-decoration:none;
  }
  .main{padding:16px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{
    border:1px solid #374866;border-radius:999px;background:rgba(255,255,255,.045);padding:7px 10px;font-size:13px;color:#dfeaff;font-weight:700;
  }
  .chip.true{border-color:rgba(125,211,252,.62);background:rgba(125,211,252,.13);color:#e0f7ff}
  .chip.false{border-color:rgba(255,107,122,.54);background:rgba(255,107,122,.12)}
  .truthmark{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:14px;
    height:14px;
    border-radius:999px;
    vertical-align:-2px;
    margin-left:4px;
    font-size:11px;
    font-weight:1000;
    line-height:1;
  }
  .truthmark.true-mark{
    background:#7dd3fc;
    box-shadow:0 0 6px rgba(125,211,252,.55);
  }
  .truthmark.false-mark{
    background:#a3262f;
    color:#ffe45e;
    text-shadow:0 0 2px rgba(0,0,0,.65);
    box-shadow:0 0 6px rgba(163,38,47,.42);
    font-size:12px;
    font-weight:1000;
    line-height:1;
    text-align:center;
  }
  .truthmark.false-mark::before{content:none;}
  .question{
    border:1px solid rgba(134,213,255,.32);background:linear-gradient(180deg,rgba(134,213,255,.10),rgba(255,255,255,.03));
    border-radius:16px;padding:15px;margin-bottom:14px;
    min-height:190px;display:flex;flex-direction:column;justify-content:flex-start;
  }
  .question .label{font-size:12px;color:var(--accent);font-weight:900;letter-spacing:.08em;margin-bottom:7px}
  .question p{margin:0;line-height:1.7;font-size:16px;font-weight:750}
  .small-note{color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}
  .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}
  .option{
    border:1px solid #425579;background:#0f1729;color:var(--text);border-radius:16px;padding:14px 12px;min-height:56px;
    cursor:pointer;font-weight:900;font-size:16px;box-shadow:0 10px 24px rgba(0,0,0,.18);
  }
  .option:hover{border-color:#79cfff;background:#16233d}
  .option.selected{border-color:rgba(255,209,102,.95);box-shadow:0 0 0 2px rgba(255,209,102,.18) inset, 0 10px 24px rgba(0,0,0,.18)}
  .option.correct{border-color:rgba(99,212,113,.98);background:rgba(99,212,113,.18)}
  .option.wrong{border-color:rgba(255,107,122,.98);background:rgba(255,107,122,.18)}
  .option:disabled{cursor:default;opacity:.97}
  .option.blue-beam{color:#7dd3fc}
  .option.purple-beam{color:#d06bff}
  .part-card{
    grid-column:1 / -1;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(15,23,41,.72);
    border-radius:16px;
    padding:13px;
  }
  .part-card h4{margin:0 0 8px;font-size:14px;color:#dceaff}
  .part-card p{margin:0 0 10px;line-height:1.65;font-size:14px;font-weight:700;white-space:pre-line}
  .part-options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .part-result{
    margin-top:10px;
    border-radius:12px;
    padding:10px;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.04);
    font-size:13px;
    line-height:1.65;
    white-space:pre-line;
  }
  .part-result.ok{border-color:rgba(99,212,113,.65);background:rgba(99,212,113,.12)}
  .part-result.ng{border-color:rgba(255,107,122,.65);background:rgba(255,107,122,.12)}
  .map-wrap{display:none;margin:0 0 14px;position:relative}
  .map-wrap.show{display:block}
  .map-wrap h4{margin:0 0 8px;font-size:14px;color:#dceaff}
  .map-help{margin:0 0 10px;font-size:12px;line-height:1.6;color:var(--muted)}
  .main.stable-map-layout .question{
    height:230px;
    min-height:230px;
    max-height:230px;
    overflow:auto;
    margin-bottom:10px;
  }
  .main.stable-map-layout .map-wrap h4{
    height:20px;
    margin-bottom:8px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .main.stable-map-layout .map-help{
    height:48px;
    min-height:48px;
    max-height:48px;
    overflow:auto;
    margin-bottom:10px;
  }
  .through-boss-marker{
    position:absolute;z-index:95;display:flex;align-items:center;justify-content:center;
    width:54px;height:54px;border-radius:50%;background:rgba(15,23,41,.94);
    box-shadow:0 8px 18px rgba(0,0,0,.24);font-size:11px;font-weight:1000;pointer-events:none;text-align:center;
  }
  .through-boss-marker.chaos{left:11%;top:12%;transform:translate(-50%,-50%);border:2px solid rgba(255,159,67,.88);color:#ffd8bf;}
  .through-boss-marker.exdeath{left:89%;top:12%;transform:translate(-50%,-50%);border:2px solid rgba(167,139,250,.88);color:#f0e6ff;}
  .through-boss-marker .truthmark{
    position:absolute;left:50%;top:-13px;transform:translateX(-50%);margin-left:0;
    width:16px;height:16px;
  }
  .map-actions{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:12px 0 14px;
  }
  .map-actions.show{display:flex}
  .map-actions-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    width:100%;
  }
  .map-problem-actions{
    opacity:.96;
  }
  .arena{
    position:relative;aspect-ratio:1/1;max-width:440px;margin:0 auto;
    border:3px solid rgba(255,255,255,.82);border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(140,170,220,.09) 0 100%),
      linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.04));
    box-shadow:inset 0 0 24px rgba(0,0,0,.10), 0 0 0 1px rgba(255,255,255,.06);
  }
  .arena.set2{border-radius:50%}
  .arena::before{
    content:'';position:absolute;inset:50% auto auto 0;width:100%;height:2px;background:rgba(255,255,255,.18);transform:translateY(-1px);
  }
  .arena::after{
    content:'';position:absolute;inset:0 auto 0 50%;width:2px;background:rgba(255,255,255,.18);transform:translateX(-1px);
  }
  .arena.flood{
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
  }
  .arena.flood::before{
    content:'';position:absolute;left:50%;top:50%;width:32px;height:100%;
    transform:translate(-50%,-50%) rotate(var(--flood-rotation,0deg));
    transform-origin:center center;border-radius:999px;background:rgba(170,54,64,.52);box-shadow:0 0 14px rgba(170,54,64,.22);
    z-index:1;
  }
  .arena.flood::after{display:none}
  .arena.flood.flood-delay::before{display:none}
  .arena.practice-preview-hidden{
    background:rgba(15,23,41,.96);
  }
  .arena.practice-preview-hidden::before,
  .arena.practice-preview-hidden::after{opacity:0}
  .arena.practice-preview-hidden > :not(.practice-map-overlay):not(.map-hud){
    visibility:hidden!important;
  }
  .arena.practice-preview-hidden .map-hud{
    visibility:visible!important;
    z-index:95;
  }
  .beam-lane{
    position:absolute;left:50%;top:50%;width:70px;height:100%;border-radius:999px;
    transform:translate(-50%,-50%);opacity:.42;pointer-events:none;z-index:0;
    box-shadow:0 0 14px rgba(255,255,255,.08);
  }
  .beam-lane.blue{background:linear-gradient(180deg, rgba(59,130,246,.38), rgba(125,211,252,.22), rgba(59,130,246,.38));}
  .beam-lane.purple{background:linear-gradient(180deg, rgba(168,85,247,.34), rgba(208,107,255,.20), rgba(168,85,247,.34));}
  .flood-symbol{
    position:absolute;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:999px;
    display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:1000;pointer-events:none;z-index:3;
    background:rgba(15,23,41,.90);box-shadow:0 8px 18px rgba(0,0,0,.25);
  }

  function roleKind(role){ return thRoles.includes(role) ? 'th' : 'dps'; }

  function makeEmptyParty(){
    const p = {};
    roles.forEach(r => p[r] = []);

  }

  function addDebuff(party, role, debuff){
    party[role].push(debuff);
  }

  function timerLabel(d){
    return d.time ? d.time : (d.timing ? timingLabel(d.timing) : '');
  }

  function chaosTimingByElement(e){
    return e === 'fire' ? 'early' : 'late';
  }

  function timeForDebuff(type, timing, sourceRound, displayRound){
    if(displayRound === 1){
      if(type === 'water' || type === 'lightning' || type === 'accel') return timing === 'early' ? '50' : '1m';
      if(type === 'gaze') return '59';
      if(type === 'fire' || type === 'waterChaos') return timing === 'early' ? '59' : '1m';
    }
    if(displayRound === 2){
      if(type === 'water' || type === 'lightning'){
        return timing === 'early' ? '35' : (sourceRound === 1 ? '59' : '59');
      }
      if(type === 'accel') return timing === 'early' ? '35' : '1m';
      if(type === 'gaze') return sourceRound === 1 ? '44' : '1m';
      if(type === 'fire' || type === 'waterChaos') return timing === 'early' ? '45' : '1m';
    }
    return '';
  }

  function makeTimedDebuff(type, timing, sourceRound, displayRound){
    return {type, timing, sourceRound, time: timeForDebuff(type, timing, sourceRound, displayRound)};
  }

  function debuffLabel(d){
    const t = timerLabel(d);
    const prefix = t ? `${t}` : '';
    if(d.type === 'water') return `${prefix}水圧縮`;
    if(d.type === 'lightning') return `${prefix}フォークライトニング`;
    if(d.type === 'accel') return `${prefix}加速度爆弾`;
    if(d.type === 'gaze') return `${prefix}叫声`;
    if(d.type === 'fire') return `${prefix}炎`;
    if(d.type === 'waterChaos') return `${prefix}水`;
    if(d.type === 'allagan') return `アラガン`;
    if(d.type === 'trans') return `死の超越`;
    if(d.type === 'dead') return `死者の傷`;
    if(d.type === 'living') return `生者の傷`;
    return d.label || d.type;
  }

  function debuffNameOnly(d){
    if(d.type === 'water') return '水圧縮';
    if(d.type === 'lightning') return 'フォークライトニング';
    if(d.type === 'accel') return '加速度爆弾';
    if(d.type === 'gaze') return '叫声';
    if(d.type === 'fire') return '炎';
    if(d.type === 'waterChaos') return '水';
    return debuffLabel(d);
  }

  function debuffHoverLabel(d){
    if(!d) return '';
    if(d.type === 'water') return '水圧縮（集合）';
    if(d.type === 'lightning') return 'フォークライトニング（散会）';
    if(d.type === 'gaze') return '叫声（視線）';
    if(d.type === 'fire') return 'ほのお';
    if(d.type === 'waterChaos') return 'つなみ';
    return debuffNameOnly(d);
  }

  function debuffLabelWithTiming(d){
    if(d && d.timing){
      return `${debuffLabel(d)}（${timingLabel(d.timing)}処理）`;
    }
    return debuffLabel(d);
  }

  function debuffLabelForPartyList(d){
    const t = timerLabel(d);
    const prefix = t ? `${t}` : '';
    if(d.type === 'lightning') return `${prefix}ライト`;
    if(d.type === 'accel') return `${prefix}加速`;
    return debuffLabel(d);
  }

  function debuffBadgeHtml(d){
    return `<span class="badge ${debuffClass(d)}">${debuffLabelWithTiming(d)}</span>`;
  }

  function debuffIconSrc(type){
    return DEBUFF_ICON_DATA[type] || '';
  }


  function partyListDebuffOrder(d){
    // パーティーリストでは、ゲーム内のデバフ付与順に近い固定順で左から表示する。
    // 死者/生者の傷 → アラガン/死の超越 → 叫声/水圧縮/フォークライトニング → 加速度 → ほのお → つなみ
    const order = {
      dead: 10,
      living: 10,
      allagan: 20,
      trans: 20,
      gaze: 30,
      water: 40,
      lightning: 40,
      accel: 50,
      fire: 60,
      waterChaos: 70
    };
    return order[d.type] ?? 999;
  }

  function sortDebuffsForPartyList(ds){
    return ds
      .map((d, i) => ({d, i}))
      .sort((a, b) => {
        const byType = partyListDebuffOrder(a.d) - partyListDebuffOrder(b.d);
        if(byType !== 0) return byType;
        const byTime = String(a.d.time || '').localeCompare(String(b.d.time || ''), 'ja', {numeric:true});
        if(byTime !== 0) return byTime;
        return a.i - b.i;
      })
      .map(x => x.d);
  }

  function chosenRoleWithDebuff(party){
    return $('#roleSelect').value || 'MT';
  }

  function assignWaterLightningAndGazeAccel(party, waterLightningTiming, gazeAccelTiming, sourceRound, displayRound){
    // 同じGC回の水雷4名には、そのGC回由来の加速度爆弾を付けない。
    // 視線持ちは必ず加速度爆弾つき。残りの無職1名/組にも、加速度爆弾のみを付ける。
    const noJobAccelTiming = oppTiming(gazeAccelTiming);
    for(const group of [thRoles, dpsRoles]){
      const s = shuffle(group);
      addDebuff(party, s[0], makeTimedDebuff('water', waterLightningTiming, sourceRound, displayRound));
      addDebuff(party, s[1], makeTimedDebuff('lightning', waterLightningTiming, sourceRound, displayRound));
      const pool = [s[2], s[3]];
      const gazeRole = pick(pool);
      const noJobRole = pool.find(r => r !== gazeRole);
      addDebuff(party, gazeRole, makeTimedDebuff('gaze', gazeAccelTiming, sourceRound, displayRound));
      addDebuff(party, gazeRole, makeTimedDebuff('accel', gazeAccelTiming, sourceRound, displayRound));
      addDebuff(party, noJobRole, makeTimedDebuff('accel', noJobAccelTiming, sourceRound, displayRound));
    }
  }

  function assignWaterLightningAndGazeAccelAcrossRounds(party, firstTiming){
    const secondTiming = oppTiming(firstTiming);
    for(const group of [thRoles, dpsRoles]){
      const s = shuffle(group);
      // GC1水雷4名：GC1では加速度なし。GC2では視線/無職側になる。
      addDebuff(party, s[0], makeTimedDebuff('water', firstTiming, 1, 2));
      addDebuff(party, s[1], makeTimedDebuff('lightning', firstTiming, 1, 2));
      // GC2水雷4名：GC2では加速度なし。GC1では視線/無職側になる。
      addDebuff(party, s[2], makeTimedDebuff('water', secondTiming, 2, 2));
      addDebuff(party, s[3], makeTimedDebuff('lightning', secondTiming, 2, 2));

      // GC1：視線は必ず早視線＋早加速度。無職は遅加速度のみ。
      const firstPool = [s[2], s[3]];
      const firstGazeRole = pick(firstPool);
      const firstNoJobRole = firstPool.find(r => r !== firstGazeRole);
      addDebuff(party, firstGazeRole, makeTimedDebuff('gaze', 'early', 1, 2));
      addDebuff(party, firstGazeRole, makeTimedDebuff('accel', 'early', 1, 2));
      addDebuff(party, firstNoJobRole, makeTimedDebuff('accel', 'late', 1, 2));

      // GC2：視線は必ず遅視線＋遅加速度。無職は早加速度のみ。
      const secondPool = [s[0], s[1]];
      const secondGazeRole = pick(secondPool);
      const secondNoJobRole = secondPool.find(r => r !== secondGazeRole);
      addDebuff(party, secondGazeRole, makeTimedDebuff('gaze', 'late', 2, 2));
      addDebuff(party, secondGazeRole, makeTimedDebuff('accel', 'late', 2, 2));
      addDebuff(party, secondNoJobRole, makeTimedDebuff('accel', 'early', 2, 2));
    }
  }

  function assignChaosToAll(party, element, sourceRound, displayRound){
    const timing = chaosTimingByElement(element);
    roles.forEach(r => addDebuff(party, r, makeTimedDebuff(element, timing, sourceRound, displayRound)));
  }

  function roleHasUsefulDebuff(party, role, round){
    const ds = party[role] || [];
    if(round === 3) return ds.some(d => ['allagan','trans'].includes(d.type));
    return ds.some(d => d.sourceRound === round && ['water','lightning','accel','gaze','fire','waterChaos'].includes(d.type));
  }

  function allRolesHaveUsefulDebuff(party, round){
    return roles.every(role => roleHasUsefulDebuff(party, role, round));
  }

  function generateGC12(round){
    let scenario;
    const fixedRole = $('#roleSelect').value;
    for(let tries=0; tries<120; tries++){
      const exTruth = bool();
      const party = makeEmptyParty();
      const firstWaterLightningTiming = bool() ? 'early' : 'late';
      const waterLightningTiming = round === 1 ? firstWaterLightningTiming : oppTiming(firstWaterLightningTiming);
      const firstChaosElement = bool() ? 'fire' : 'waterChaos';
      const chaosElement = round === 1 ? firstChaosElement : (firstChaosElement === 'fire' ? 'waterChaos' : 'fire');
      const chaosTruth = bool();

      if(round === 1){
        assignWaterLightningAndGazeAccel(party, waterLightningTiming, 'early', 1, 1);
        assignChaosToAll(party, chaosElement, 1, 1);
      } else {
        assignWaterLightningAndGazeAccelAcrossRounds(party, firstWaterLightningTiming);
        assignChaosToAll(party, firstChaosElement, 1, 2);
        assignChaosToAll(party, chaosElement, 2, 2);
      }

      if(!allRolesHaveUsefulDebuff(party, round)) continue;
      const role = fixedRole;

      const q = chooseGC12Question(party, role, exTruth, chaosTruth, round, firstWaterLightningTiming, waterLightningTiming);
      if(!q) continue;
      scenario = {round, party, role, exTruth, chaosTruth, chaosElement, firstChaosElement, firstWaterLightningTiming, waterLightningTiming, question:q};
      break;
    }
    return scenario || generateGC12Fallback(round);
  }

  function generateGC12Fallback(round){
    const exTruth = bool();
    const party = makeEmptyParty();
    const firstWaterLightningTiming = bool() ? 'early' : 'late';
    const waterLightningTiming = round === 1 ? firstWaterLightningTiming : oppTiming(firstWaterLightningTiming);
    const firstChaosElement = bool() ? 'fire' : 'waterChaos';
    const chaosElement = round === 1 ? firstChaosElement : (firstChaosElement === 'fire' ? 'waterChaos' : 'fire');
    if(round === 1){
      assignWaterLightningAndGazeAccel(party, waterLightningTiming, 'early', 1, 1);
      assignChaosToAll(party, chaosElement, 1, 1);
    } else {
      assignWaterLightningAndGazeAccelAcrossRounds(party, firstWaterLightningTiming);
      assignChaosToAll(party, firstChaosElement, 1, 2);
      assignChaosToAll(party, chaosElement, 2, 2);
    }
    const role = $('#roleSelect').value || 'MT';
    roles.forEach(r => {
      if(!roleHasUsefulDebuff(party, r, round)){
        addDebuff(party, r, makeTimedDebuff('accel', round === 1 ? 'early' : 'late', round, round));
      }
    });
    const q = chooseGC12Question(party, role, exTruth, chaosTruth, round, firstWaterLightningTiming, waterLightningTiming);
    return {round, party, role, exTruth, chaosTruth:bool(), chaosElement, firstChaosElement, firstWaterLightningTiming, waterLightningTiming, question:q};
  }

  function chooseGC12Question(party, role, exTruth, chaosTruth, round, firstTiming, currentTiming){
    const ds = party[role].filter(d => d.sourceRound === round && ['water','lightning','accel','gaze'].includes(d.type));
    const chaos = party[role].find(d => d.sourceRound === round && ['fire','waterChaos'].includes(d.type));
    if(!ds.length && !chaos) return null;

    const parts = [];
    const wl = ds.filter(d => d.type === 'water' || d.type === 'lightning');
    const acc = ds.filter(d => d.type === 'accel');
    const gaze = ds.filter(d => d.type === 'gaze');

    ds.filter(d => d.timing).forEach(d => parts.push(makeTimingQuestion(role, d, round)));
    wl.forEach(d => parts.push(makeWaterLightningQuestion(role, d, exTruth, round)));
    acc.forEach(d => parts.push(makeAccelQuestion(role, d, exTruth, round)));
    gaze.forEach(d => parts.push(makeGazeQuestion(role, d, exTruth, round)));
    if(round === 2 && wl.length){
      wl.forEach(d => parts.push(makeOppositeTimingQuestion(role, d, firstTiming, currentTiming)));
    }

    if(chaos){
      parts.push(makeTimingQuestion(role, chaos, round));
      parts.push(makeChaosShapeQuestion(role, chaos, chaosTruth, round));
    }

    return makeGC12MultiQuestion(role, round, parts);
  }

  function makeGC12MultiQuestion(role, round, parts){
    parts.forEach(p => {
      p.answered = false;
      p.selected = null;
      p.revealed = false;
      p.scored = false;
    });
    const note = round === 1
      ? '付与時のデバフの残り秒数が59秒以下なら早デバフであり、デバフ処理1回目で処理。デバフの残り秒数が1m（残り1分以上）なら遅デバフであり、デバフ処理2回目で処理。カオスはほのお・つなみ（タケノコ円・タケノコドーナツ範囲）の真偽、エクスデスはその他デバフの真偽を示します。'
      : '1回目のデバフの秒数は2回目付与時の残り秒数に修正しています。2回目に付与されたデバフに下線を引き、枠で囲んで目立たせています。2回目GCでは水雷の早遅が1回目と逆になります。カオスはほのお・つなみ（タケノコ円・タケノコドーナツ範囲）の真偽、エクスデスはその他デバフの真偽を示します。';
    return {

      prompt:`あなたは ${role} です。\n${role} についた回答対象デバフについて、必要な判断を順番に答えてください。`,
      note,

      noScore:false

  }

  function rotateMapPoint(x, y, step){
    const rad = (Math.PI / 4) * step;
    const dx = x - 50;
    const dy = y - 50;
    return {
      x: 50 + dx * Math.cos(rad) - dy * Math.sin(rad),
      y: 50 + dx * Math.sin(rad) + dy * Math.cos(rad)
    };
  }

  const P4_ICE_PATTERNS = [
    { value:"13", label:"1・3", zones:["A","C"] },
    { value:"24", label:"2・4", zones:["B","D"] }
  ];
  const P4_LIGHT_PATTERNS = [
    { slope:"up", label:"右肩上がり", startsDanger:false },
    { slope:"up", label:"右肩上がり", startsDanger:true },
    { slope:"down", label:"右肩下がり", startsDanger:false },

  function makeP4AoeConfig(phase){
    return {
      phase,
      ice: pick(P4_ICE_PATTERNS),
      light: pick(P4_LIGHT_PATTERNS),
      thunderChargeTruth: bool(),
      iceChargeTruth: bool(),
      thunderOutTruth: bool(),
      iceOutTruth: bool()
    };
  }

  function p4AoeVisibleLightningDanger(board, band){
    return board.light.startsDanger ? (band % 2 === 0) : (band % 2 === 1);
  }

  function p4AoePointInVisibleIce(pt, board){
    const isA = pt.x < 50 && pt.y < 50;
    const isB = pt.x >= 50 && pt.y < 50;
    const isC = pt.x >= 50 && pt.y >= 50;
    const isD = pt.x < 50 && pt.y >= 50;
    return board.ice.value === '13' ? (isA || isC) : (isB || isD);
  }

  function p4AoePointInLightningShownDanger(pt, board){
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    const deg = board.light.slope === 'up' ? 45 : -45;
    const rad = deg * Math.PI / 180;
    const xr = 50 + dx * Math.cos(rad) - dy * Math.sin(rad);
    let band = Math.floor(xr / 25);
    if(band < 0) band = 0;
    if(band > 3) band = 3;
    return p4AoeVisibleLightningDanger(board, band);
  }

  function p4AoePointInCircle(pt){
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    return dx * dx + dy * dy <= 50 * 50;
  }

  function p4AoeThunderSafeByTruth(pt, board, truth){
    const shownDanger = p4AoePointInLightningShownDanger(pt, board);
    const actualDanger = truth ? shownDanger : !shownDanger;
    return !actualDanger;
  }

  function p4AoeIceSafeByTruth(pt, board, truth){
    const shownDanger = p4AoePointInVisibleIce(pt, board);
    const actualDanger = truth ? shownDanger : !shownDanger;
    return !actualDanger;
  }

  function p4AoeThunderFinalSafe(pt, board){
    const rememberedSafe = p4AoeThunderSafeByTruth(pt, board, board.thunderChargeTruth);
    return board.thunderOutTruth ? rememberedSafe : !rememberedSafe;
  }

  function p4AoeIceFinalSafe(pt, board){
    const rememberedSafe = p4AoeIceSafeByTruth(pt, board, board.iceChargeTruth);
    return board.iceOutTruth ? rememberedSafe : !rememberedSafe;
  }

  function p4AoePointIsCorrect(pt, board){
    if(!p4AoePointInCircle(pt)) return false;
    if(board.phase === 'thunderCharge') return p4AoeThunderSafeByTruth(pt, board, board.thunderChargeTruth);
    if(board.phase === 'iceCharge') return p4AoeIceSafeByTruth(pt, board, board.iceChargeTruth);
    if(board.phase === 'readBoth') return p4AoeThunderSafeByTruth(pt, board, board.thunderChargeTruth) && p4AoeIceSafeByTruth(pt, board, board.iceChargeTruth);
    return p4AoeThunderFinalSafe(pt, board) && p4AoeIceFinalSafe(pt, board);
  }

  function p4AoeActualLightningSafeBands(board, mode){
    const safeBands = [];
    for(let idx=0; idx<4; idx++){
      let safe = !p4AoeVisibleLightningDanger(board, idx);
      if(mode === 'charge'){
        if(!board.thunderChargeTruth) safe = !safe;
      } else {
        const remembered = board.thunderChargeTruth ? safe : !safe;
        safe = board.thunderOutTruth ? remembered : !remembered;
      }
      if(safe) safeBands.push(idx);
    }
    return safeBands;
  }

  function p4AoeActualIceSafeZones(board, mode){
    const shownZones = board.ice.zones;
    const otherZones = board.ice.value === '13' ? ['B','D'] : ['A','C'];
    if(mode === 'charge'){
      return board.iceChargeTruth ? otherZones : shownZones;
    }
    const rememberedZones = board.iceChargeTruth ? otherZones : shownZones;
    const oppositeZones = rememberedZones.join('') === 'AC' ? ['B','D'] : ['A','C'];
    return board.iceOutTruth ? rememberedZones : oppositeZones;
  }

  function makeDebuffFlowSet2Question(sc, role, slideIndex){

Aを北固定で、遅水雷を処理します。氷床の真偽込み安置に入りつつ、ロール別の頭割り/散開位置をクリックしてください。${accelCheck.required ? '\nその後、遅加速度の動く/止まるも選んでください。' : ''}`,

      note:'大きい点線の丸が、TH/DPS別の頭割り・AoE捨てエリアです。クリック位置が「正しい点線エリア内」かつ「氷床の真偽込み安置内」なら位置は正解です。遅加速度が付いている場合は、続けて動く/止まるも判定します。',

        : `${role} には遅水雷がないため、基本位置確認として${correctArea?.label || correct}の点線エリア内、かつ氷床の真偽込み安置内をクリックします。`) + `
${accelCheck.explanation}`,

  function makeDebuffFlowSlideQuestion(sc, role, slideIndex){
    const i = ((slideIndex % DEBUFF_FLOW_TOTAL) + DEBUFF_FLOW_TOTAL) % DEBUFF_FLOW_TOTAL;
    if(i === 0) return makeDebuffFlowSet1Question(sc, role, i);
    if(i === 1) return makeDebuffFlowGazeQuestion(sc, role, 'early', i, '早視線処理', '雷床安置に入り、そこで視線を処理します。マジックチャージ1回目の暗記はこのタブでは要求しません。');
    if(i === 2) return makeDebuffFlowCenterQuestion(role, i, 'early');
    if(i === 3) return makeDebuffFlowChaosQuestion(sc, role, 'early', i, '早ほのおタケノコ捨て', '全員中央集合後、早ほのおを処理します。');
    if(i === 4) return makeDebuffFlowSet2Question(sc, role, i);
    if(i === 5) return makeDebuffFlowGazeQuestion(sc, role, 'late', i, '遅視線処理', '遅視線持ちはケフカ足元へ駆け込みます。');
    if(i === 6) return makeDebuffFlowCenterQuestion(role, i, 'late');
    return makeDebuffFlowChaosQuestion(sc, role, 'late', i, '遅つなみタケノコ捨て', '遅視線後、全員ケフカ下に集合して遅つなみを処理します。');
  }

  function getDebuffFlowConfig(sc, key, factory){
    if(!sc.debuffFlowConfigs) sc.debuffFlowConfigs = {};
    if(!sc.debuffFlowConfigs[key]) sc.debuffFlowConfigs[key] = factory();
    return sc.debuffFlowConfigs[key];
  }

    const idx = ((slideIndex % DEBUFF_FLOW_TOTAL) + DEBUFF_FLOW_TOTAL) % DEBUFF_FLOW_TOTAL;

  function cloneDebuffFlowActionQuestionWithPositionTitle(q, slideIndex){
    const localIndex = slideIndex - DEBUFF_FLOW_READ_TOTAL;
    const originalType = q.type || '確認';
    const label = originalType.replace(/^デバフ処理 \d+\/\d+：/, '');
    return {
      ...q,

  function getDebuffFlowPositionSlideQuestion(sc, role, slideIndex){
    const idx = ((slideIndex % DEBUFF_FLOW_POSITION_TOTAL) + DEBUFF_FLOW_POSITION_TOTAL) % DEBUFF_FLOW_POSITION_TOTAL;
    sc.debuffFlowSlide = idx;
    const fullParty = sc.fullParty || sc.party;
    if(idx === 0){
      sc.party = clonePartyWithSourceRound(fullParty, 1, 1);
      sc.round = 1;
      sc.exTruth = sc.baseExTruth ?? sc.exTruth;
      sc.chaosTruth = sc.baseChaosTruth ?? sc.chaosTruth;
      sc.chaosElement = sc.firstChaosElement;
      sc.waterLightningTiming = sc.firstWaterLightningTiming;
      return makeDebuffFlowReadQuestion(sc, role, idx, 'gc1');
    }
    if(idx === 1){
      sc.party = fullParty;
      sc.round = 2;
      sc.exTruth = sc.baseExTruth ?? sc.exTruth;
      sc.chaosTruth = sc.baseChaosTruth ?? sc.chaosTruth;
      sc.chaosElement = sc.secondChaosElement || sc.chaosElement;
      return makeDebuffFlowReadQuestion(sc, role, idx, 'gc2');
    }
    sc.party = fullParty;
    sc.round = 2;
    sc.exTruth = sc.baseExTruth ?? sc.exTruth;
    sc.chaosTruth = sc.baseChaosTruth ?? sc.chaosTruth;
    const q = getDebuffFlowSlideQuestion(sc, role, idx - DEBUFF_FLOW_READ_TOTAL);
    return cloneDebuffFlowActionQuestionWithPositionTitle(q, idx);
  }

  function makeDebuffFlowPositionQuestion(role, slideIndex = 0){
    const sc = generateGC12(2);
    sc.positionKind = 'debuffFlow';
    sc.role = role;
    sc.fullParty = mergeParties(sc.party);
    sc.baseExTruth = sc.exTruth;
    sc.baseChaosTruth = sc.chaosTruth;
    sc.secondChaosElement = sc.chaosElement;
    sc.debuffFlowSlide = ((slideIndex % DEBUFF_FLOW_POSITION_TOTAL) + DEBUFF_FLOW_POSITION_TOTAL) % DEBUFF_FLOW_POSITION_TOTAL;
    sc.exStep = rnd(8);
    sc.debuffFlowQuestions = {};
    sc.debuffFlowConfigs = {};
    sc.readBoards = {
      gc1: makeThroughReadBoard(makeP4AoeConfig('readBoth')),
      gc2: makeThroughReadBoard(makeP4AoeConfig('readBoth'))
    };
    sc.question = getDebuffFlowPositionSlideQuestion(sc, role, sc.debuffFlowSlide);
    return sc;
  }


  function clonePartyWithSourceRound(party, sourceRound, displayRound){
    const p = makeEmptyParty();
    roles.forEach(role => {
      (party[role] || []).forEach(d => {
        if(d.sourceRound !== sourceRound) return;
        const copy = {...d};
        if(copy.timing && ['water','lightning','accel','gaze','fire','waterChaos'].includes(copy.type)){
          copy.time = timeForDebuff(copy.type, copy.timing, copy.sourceRound, displayRound);
        }
        p[role].push(copy);
      });
    });
    return p;
  }

  function mergeParties(...parties){
    const p = makeEmptyParty();
    roles.forEach(role => {
      parties.forEach(party => {
        (party?.[role] || []).forEach(d => p[role].push({...d}));
      });
    });
    return p;
  }

  function makeThroughReadBoard(baseBoard){
    const board = cloneP4AoeBoardForPhase(baseBoard || makeP4AoeConfig('readBoth'), 'readBoth');
    board.phase = 'readBoth';
    return board;
  }

  function makeThroughReadQuestion(sc, role, slideIndex, readKind){
    const board = makeThroughReadBoard(sc.readBoards[readKind] || makeP4AoeConfig('readBoth'));
    sc.readBoards[readKind] = board;
    const labelMap = {
      gc1:'1回目GCデバフ付与＋なぞなぞマジック床',
      gc2:'2回目GCデバフ付与＋なぞなぞマジック床',
      gc3:'3回目GCデバフ付与＋なぞなぞマジック床'
    };
    const detailMap = {
      gc1:'エクスデスは1回目GCデバフ、カオスはほのお/つなみ、ケフカは真偽つき雷床/氷床を提示します。ここはマジックチャージではありません。',
      gc2:'エクスデスは2回目GCデバフを追加し、カオスは2回目のほのお/つなみ、ケフカは真偽つき雷床/氷床を提示します。ここもマジックチャージではありません。',
      gc3:'エクスデスは3回目GCのアラガン/超越と傷、ケフカは真偽つき雷床/氷床を提示します。ここもマジックチャージではありません。'
    };
    const label = labelMap[readKind] || 'GCデバフ付与＋なぞなぞマジック床';
    return {
      type:`P4通し ${slideIndex + 1}/${THROUGH_TOTAL}：${label}`,
      prompt:`あなたは ${role} です。\n${detailMap[readKind]}\n雷床と氷床の真偽込みで、床の安置をクリックしてください。`,
      promptHtml:`あなたは ${role} です。<br>${detailMap[readKind]}<br>雷床と氷床の真偽込みで、床の安置をクリックしてください。`,
      note:'なぞなぞマジック床の読み取り用です。チャージの暗記ではなく、表示された雷床・氷床の真偽を見て、その時点の本当の安置をクリックします。',
      aoeBoard:board,
      noScore:false
    };
  }

  function syncThroughMagicBoard(sc, role){
    if(!sc.magicBoard) sc.magicBoard = makeP4AoeConfig('magicOut');
    const gazeQ = getDebuffFlowSlideQuestion(sc.debuff, role, 1);
    if(gazeQ?.aoeGazeBoard){
      sc.magicBoard.light = {...gazeQ.aoeGazeBoard.light};
      sc.magicBoard.thunderChargeTruth = !!gazeQ.aoeGazeBoard.thunderTruth;
    }
    const iceQ = getDebuffFlowSlideQuestion(sc.debuff, role, 4);
    if(iceQ?.debuffSet2Board?.iceBoard){
      const iceBoard = iceQ.debuffSet2Board.iceBoard;
      sc.magicBoard.ice = {...iceBoard.ice, zones:[...(iceBoard.ice?.zones || [])]};
      sc.magicBoard.iceChargeTruth = !!iceBoard.iceTruth;
    }
    return sc.magicBoard;
  }

  function cloneQuestionWithThroughTitle(q, slideIndex){
    const prefix = `P4通し ${slideIndex + 1}/${THROUGH_TOTAL}`;
    const originalType = q.type || '確認';
    if(originalType.startsWith(prefix)) return q;
    const label = originalType
      .replace(/^デバフ処理 \d+\/\d+：/, '')
      .replace(/^マジックチャージ \d+\/\d+：/, '')
      .replace(/^無の氾濫$/, '無の氾濫');
    return {
      ...q,
      type:`${prefix}：${label}`
    };
  }

  function makeThroughPracticePositionQuestion(role, slideIndex = 0){
    const debuff = generateGC12(2);
    debuff.positionKind = 'throughDebuffBase';
    debuff.debuffFlowQuestions = {};
    debuff.debuffFlowConfigs = {};
    const flood = generateGC3();
    flood.floodConfig = {leftColor: bool() ? 'blue' : 'purple', rotationStep: rnd(8)};
    debuff.exStep = flood.floodConfig.rotationStep;
    const sc = {
      round:'through',
      role,
      positionKind:'through',
      throughSlide: ((slideIndex % THROUGH_TOTAL) + THROUGH_TOTAL) % THROUGH_TOTAL,
      debuff,
      flood,
      readBoards:{
        gc1: makeThroughReadBoard(makeP4AoeConfig('readBoth')),
        gc2: makeThroughReadBoard(makeP4AoeConfig('readBoth')),
        gc3: makeThroughReadBoard(makeP4AoeConfig('readBoth'))
      },
      magicBoard: makeP4AoeConfig('magicOut'),
      party: debuff.party,
      throughQuestions: {}
    };
    syncThroughMagicBoard(sc, role);
    sc.question = getThroughSlideQuestion(sc, role, sc.throughSlide);
    return sc;
  }

  function throughSourceForSlide(slideIndex){
    const idx = ((slideIndex % THROUGH_TOTAL) + THROUGH_TOTAL) % THROUGH_TOTAL;
    if(idx === 0) return {kind:'read', readKind:'gc1'};
    if(idx === 1) return {kind:'read', readKind:'gc2'};
    if(idx === 2) return {kind:'read', readKind:'gc3'};
    if(idx === 3) return {kind:'flood', localIndex:0};
    if(idx === 4) return {kind:'debuffFlow', localIndex:0};
    if(idx === 5) return {kind:'debuffFlow', localIndex:1};
    if(idx === 6) return {kind:'debuffFlow', localIndex:2};
    if(idx === 7) return {kind:'debuffFlow', localIndex:3};
    if(idx === 8) return {kind:'debuffFlow', localIndex:4};
    if(idx === 9) return {kind:'debuffFlow', localIndex:5};
    if(idx === 10) return {kind:'debuffFlow', localIndex:6};
    if(idx === 11) return {kind:'debuffFlow', localIndex:7};
    return {kind:'magicCharge', localIndex:2};
  }

  function floodGc3ThroughSlide(localIndex){
    return Math.max(0, localIndex || 0) === 0 ? 2 : 3;
  }

  function floodGc3LocalSlide(throughSlide){
    return (throughSlide || 0) <= 2 ? 0 : 1;
  }

  function relabelFloodGc3Question(q, localIndex){
    const label = localIndex === 0 ? '3回目GC読取' : '無の氾濫';
    return {
      ...q,
      type:`GC3＋無の氾濫 ${localIndex + 1}/2：${label}`
    };
  }

  function getFloodGc3SlideQuestion(sc, role, slideIndex){
    const localIndex = Math.max(0, Math.min(1, slideIndex || 0));
    sc.floodGc3Slide = localIndex;
    const q = getThroughSlideQuestion(sc, role, floodGc3ThroughSlide(localIndex));
    return relabelFloodGc3Question(q, localIndex);
  }

  function makeThroughMagicOutKefkaCheck(sc, role){
    const ds = sc?.debuff?.party?.[role] || [];
    const d = findTimedDebuff(sc.debuff.party, role, 'late', ['fire','waterChaos']) || ds.find(x => ['fire','waterChaos'].includes(x.type));
    const base = d?.type === 'fire' ? 'circle' : 'donut';
    const finalShape = sc.debuff.chaosTruth ? base : (base === 'circle' ? 'donut' : 'circle');
    return {
      area: finalShape === 'circle' ? 'outside' : 'inside',
      finalShape,
      radius: 22,
      label: finalShape === 'circle' ? '点線円の外側' : '点線円の中'
    };
  }

  function p4AoePointInKefkaMagicZone(pt, check){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number' || !check) return false;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist <= (check.radius || 22);
  }

  function p4AoeQuestionPointIsCorrect(pt, q){
    if(!q?.aoeBoard || !p4AoePointIsCorrect(pt, q.aoeBoard)) return false;
    if(q.magicOutKefkaCheck){
      const inside = p4AoePointInKefkaMagicZone(pt, q.magicOutKefkaCheck);
      return q.magicOutKefkaCheck.area === 'inside' ? inside : !inside;
    }
    return true;
  }

  function getThroughSlideQuestion(sc, role, slideIndex){
    const idx = ((slideIndex % THROUGH_TOTAL) + THROUGH_TOTAL) % THROUGH_TOTAL;
    sc.throughSlide = idx;
    const src = throughSourceForSlide(idx);
    let q;
    if(src.kind === 'read'){
      if(src.readKind === 'gc1'){
        sc.party = clonePartyWithSourceRound(sc.debuff.party, 1, 1);
        sc.round = 1;
        sc.exTruth = sc.debuff.exTruth;
        sc.chaosTruth = sc.debuff.chaosTruth;
        sc.chaosElement = sc.debuff.firstChaosElement;
        sc.waterLightningTiming = sc.debuff.firstWaterLightningTiming;
      } else if(src.readKind === 'gc2'){
        sc.party = sc.debuff.party;
        sc.round = 2;
        sc.exTruth = sc.debuff.exTruth;
        sc.chaosTruth = sc.debuff.chaosTruth;
        sc.chaosElement = sc.debuff.chaosElement;
        sc.firstChaosElement = sc.debuff.firstChaosElement;
        sc.firstWaterLightningTiming = sc.debuff.firstWaterLightningTiming;
        sc.waterLightningTiming = sc.debuff.waterLightningTiming;
      } else {
        sc.party = mergeParties(sc.debuff.party, sc.flood.party);
        sc.round = 3;
        sc.exTruth = sc.flood.exTruth;
        sc.beamTruth = sc.flood.beamTruth;
      }
      q = makeThroughReadQuestion(sc, role, idx, src.readKind);
    } else if(src.kind === 'flood'){
      sc.party = mergeParties(sc.debuff.party, sc.flood.party);
      sc.round = 3;
      sc.exTruth = sc.flood.exTruth;
      sc.beamTruth = sc.flood.beamTruth;
      sc.flood.question = makeFloodPositionQuestion(role, sc.flood.party, sc.flood.exTruth, sc.flood.beamTruth, sc.flood.floodConfig);
      q = sc.flood.question;
    } else if(src.kind === 'debuffFlow'){
      sc.party = sc.debuff.party;
      sc.round = 2;
      sc.exTruth = sc.debuff.exTruth;
      sc.chaosTruth = sc.debuff.chaosTruth;
      sc.chaosElement = sc.debuff.chaosElement;
      sc.firstChaosElement = sc.debuff.firstChaosElement;
      sc.firstWaterLightningTiming = sc.debuff.firstWaterLightningTiming;
      sc.waterLightningTiming = sc.debuff.waterLightningTiming;
      q = getDebuffFlowSlideQuestion(sc.debuff, role, src.localIndex);
      syncThroughMagicBoard(sc, role);
    } else {
      sc.party = sc.debuff.party;
      sc.round = 2;
      sc.exTruth = sc.debuff.exTruth;
      sc.chaosTruth = sc.debuff.chaosTruth;
      sc.chaosElement = sc.debuff.chaosElement;
      sc.firstChaosElement = sc.debuff.firstChaosElement;
      sc.firstWaterLightningTiming = sc.debuff.firstWaterLightningTiming;
      sc.waterLightningTiming = sc.debuff.waterLightningTiming;
      const magicBoard = syncThroughMagicBoard(sc, role);
      q = makeMagicChargePositionQuestion(src.localIndex, magicBoard);
      if(src.localIndex === 2){
        q.magicOutKefkaCheck = makeThroughMagicOutKefkaCheck(sc, role);
        const zoneText = q.magicOutKefkaCheck.area === 'inside' ? '点線円の中' : '点線円の外側';
        const shapeText = q.magicOutKefkaCheck.finalShape === 'circle' ? 'タケノコ円' : 'タケノコドーナツ範囲';
        q.prompt = `${q.prompt}\n12枚目のタケノコ判定も込みで、${zoneText}かつマジックアウトの正解安置をクリックしてください。`;
        q.promptHtml = `${q.promptHtml}<br>12枚目のタケノコ判定：${shapeText}なので、${zoneText}かつマジックアウトの正解安置をクリックしてください。`;
        q.note = `${q.note || ''}\nケフカのタゲサより一回り大きい点線円を表示しています。タケノコ円なら点線円の外側、タケノコドーナツ範囲なら点線円の中で、マジックアウトの正解安置に入ります。`;
      }
    }
    return cloneQuestionWithThroughTitle(q, idx);
  }

  function generatePositionScenario(kind, slideIndex = 0, magicBoardOverride = null){
    if(kind === 'flood'){
      const sc = generateGC3();
      sc.positionKind = 'flood';
      sc.floodConfig = {leftColor: bool() ? 'blue' : 'purple', rotationStep: rnd(8)};
      sc.question = makeFloodPositionQuestion(sc.role, sc.party, sc.exTruth, sc.beamTruth, sc.floodConfig);
      return sc;
    }
    if(kind === 'floodGc3'){
      const role = $('#roleSelect').value || 'MT';
      const localIndex = Math.max(0, Math.min(1, slideIndex || 0));
      const sc = makeThroughPracticePositionQuestion(role, floodGc3ThroughSlide(localIndex));
      sc.positionKind = 'floodGc3';
      sc.floodGc3Slide = localIndex;
      sc.question = getFloodGc3SlideQuestion(sc, role, localIndex);
      return sc;
    }
    if(kind === 'debuffFlow'){
      return makeDebuffFlowPositionQuestion($('#roleSelect').value || 'MT', slideIndex);
    }
    if(kind === 'magicCharge'){
      const party = makeEmptyParty();
      const role = $('#roleSelect').value || 'MT';
      const idx = ((slideIndex % 3) + 3) % 3;
      const magicBoard = magicBoardOverride || makeP4AoeConfig('thunderCharge');
      return {
        round:'positionMagic',
        party,
        role,
        positionKind:'magicCharge',
        magicSlide: idx,
        magicBoard,
        question: makeMagicChargePositionQuestion(idx, magicBoard)
      };
    }
    if(kind === 'through'){
      return makeThroughPracticePositionQuestion($('#roleSelect').value || 'MT', slideIndex);
    }
    const sc = generateGC12(2);
    sc.positionKind = kind;
    sc.question = makeSet2PositionQuestion(sc.role, sc.party, sc.exTruth);
    return sc;
  }

  function calcGC3Correct(hasAllagan, exTruth, beamTruth){
    // エクスデス真偽はアラガン/超越と傷色の両方にかかる。
    // ボタンの「同色/逆色」は表示されている傷色を基準にするため、
    // エクスデス偽による2つの反転はいったん打ち消し合い、その後ビーム真偽で反転する。
    const effectiveHasAllagan = exTruth ? hasAllagan : !hasAllagan;
    const woundFlipped = !exTruth;
    let oppositeToDisplayedWound = effectiveHasAllagan !== woundFlipped;
    if(!beamTruth) oppositeToDisplayedWound = !oppositeToDisplayedWound;
    return oppositeToDisplayedWound ? 'opposite' : 'same';
  }

  function makeGC3Question(role, party, exTruth, beamTruth){
    const hasAllagan = party[role].some(d => d.type === 'allagan');
    const relationCorrect = calcGC3Correct(hasAllagan, exTruth, beamTruth);
    const wound = party[role].find(d => d.type === 'dead' || d.type === 'living');
    const sameColor = wound?.type === 'dead' ? 'blue' : 'purple';
    const oppositeColor = sameColor === 'blue' ? 'purple' : 'blue';
    const correct = relationCorrect === 'same' ? sameColor : oppositeColor;
    const blueRelation = sameColor === 'blue' ? '同色' : '異色';
    const purpleRelation = sameColor === 'purple' ? '同色' : '異色';
    return {
      type:'GC3ビーム判定',
      prompt:`あなたは ${role} です。
${role} には「${hasAllagan ? 'アラガンフィールド' : '死の超越'}」と「${debuffLabel(wound)}」が付いています。
入るべきビームはどちらですか？`,
      note:'青ビーム/紫ビームで選択。括弧内は、自分の傷デバフに対して同色か異色かを表します。中央の細い即死ビームは踏まない。',
      options:[{key:'blue',label:`青ビーム（${blueRelation}）`,cls:'blue-beam'},{key:'purple',label:`紫ビーム（${purpleRelation}）`,cls:'purple-beam'}],
      correct,
      explanation: makeGC3Explanation(hasAllagan, exTruth, beamTruth, relationCorrect, correct)
    };
  }

  function generateGC3(){
    const party = makeEmptyParty();
    const allagan = new Set([...shuffle(thRoles).slice(0,2), ...shuffle(dpsRoles).slice(0,2)]);
    const deadRoles = new Set(shuffle(roles).slice(0,4));
    roles.forEach(r => {
      addDebuff(party, r, {type: allagan.has(r) ? 'allagan' : 'trans', time:'15'});
      addDebuff(party, r, {type: deadRoles.has(r) ? 'dead' : 'living', time:'15'});
    });
    const exTruth = bool();
    const beamTruth = bool();
    const role = $('#roleSelect').value || 'MT';
    const q = makeGC3Question(role, party, exTruth, beamTruth);
    return {round:3, party, role, exTruth, beamTruth, question:q};
  }

  function makeGC3Explanation(hasAllagan, exTruth, beamTruth, relationCorrect, colorCorrect){
    const d = hasAllagan ? 'アラガンフィールド' : '死の超越';
    const base = hasAllagan ? '逆色ビーム' : '同色ビーム';
    const relationFinal = relationCorrect === 'same' ? '同色ビーム' : '逆色ビーム';
    const colorFinal = colorCorrect === 'blue' ? '青ビーム' : '紫ビーム';
    const exText = exTruth
      ? `エクスデスが真なので、${d}と傷の色は表示どおりです。`
      : `エクスデスが偽なので、${d}と傷の色はどちらも反転します。表示されている傷色を基準に見ると、同色/逆色の関係はいったん同じになります。`;
    const beamText = beamTruth
      ? `ビームが真なので、${base}のまま処理します。`
      : `その後、ビームが偽なので、${base}から反転します。`;
    return `${exText}
${beamText}
関係としては「${relationFinal}」。実際に入る場所は「${colorFinal}」です。`;
  }

  function practiceTimeForSlide(index, kind = practiceKindFromTab()){
    const idx = Math.max(0, index || 0);
    const tables = {
      flood: [5],
      floodGc3: [4, 11],
      debuffFlow: [4, 4, 8, 6, 4, 2, 3, 5, 3, 3],

    };

    return (table[idx] || table[0] || 7) * 1000;

    return 3;

  function practiceElapsedMs(){
    const p = state.practice;
    if(p.phase !== 'answer') return 0;
    return Math.max(0, (p.slideTimeMs || 0) - (p.remainingMs || 0));
  }

  function practiceHideEarlyGazeThunder(){
    return isPracticeMode()
      && state.practice.phase === 'answer'
      && practiceCurrentKind() === 'debuffFlow'
      && practiceCurrentSlideIndex() === DEBUFF_FLOW_READ_TOTAL + 1
      && practiceElapsedMs() < 1000;

  function practiceThroughFloodRevealLevel(){
    const kind = practiceCurrentKind();
    const idx = practiceCurrentSlideIndex();
    const isFloodSlide = (kind === 'through' && idx === 3) || (kind === 'floodGc3' && idx === 1);
    if(!isPracticeMode() || !isFloodSlide || state.practice.phase !== 'answer') return 2;
    const elapsed = practiceElapsedMs();
    if(elapsed < 5000) return 0;
    if(elapsed < 6000) return 1;
    return 2;
  }

  function practiceShouldHidePreview(){
    if(!isPracticeMode()) return false;
    const p = state.practice;
    return p.phase === 'idle' || (p.phase === 'countdown' && !p.paused);

  function practiceSlideLabel(index, kind = practiceKindFromTab()){
    const tables = {
      flood: ['無の氾濫'],
      floodGc3: ['3回目GC読取', '無の氾濫'],
      debuffFlow: ['1回目GC読取', '2回目GC読取', '早デバフ処理', '早視線処理', '中央集合', '早ほのお処理', '遅雷水処理', '遅視線処理', '中央集合', '遅つなみ処理'],
      magicCharge: ['雷床チャージ', '氷床チャージ', 'マジックアウト'],
      through: [

        '遅雷水処理', '遅視線処理', '中央集合', '遅つなみ処理', 'マジックアウト'
